<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Financeiro - Dexco</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        html, body {
            height: 100%;
            overflow: hidden; 
        }

        body {
            zoom: 0.8; 
            display: flex;
            background-color: #f8fafc;
        }

        /* Menu Lateral */
        .sidebar { width: 250px; background-color: #1e293b; color: white; padding: 20px; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { margin-bottom: 30px; font-size: 1.5rem; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .nav-btn { background: none; border: none; color: #cbd5e1; padding: 12px; text-align: left; cursor: pointer; border-radius: 5px; margin-bottom: 10px; font-size: 1rem; transition: 0.3s; width: 100%; }
        .nav-btn:hover, .nav-btn.active { background-color: #334155; color: white; }

        /* ==========================================================
           CONTEÚDO: REMOVIDO O '100vh' PARA O FLEXBOX AGIR NATURALMENTE
        ========================================================== */
        .content { 
            flex: 1; 
            padding: 40px; 
            overflow-y: auto; 
            position: relative; /* FUNDAMENTAL para a aba do caixa esticar */
        }

        .tab-content { display: none; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .tab-content.active { display: block; }
        .tab-content h1 { color: #0f172a; margin-bottom: 15px; }
        .tab-content p { color: #475569; }
        
        .tab-content iframe {
            width: 100%;
            height:  calc(100vh - 170px);
            border: none;
            border-radius: 8px;
            background-color: #f8fafc;
        }

        /* ==================================================================
           A MÁGICA DEFINITIVA PARA O CAIXA: ANCORAGEM ABSOLUTA
           (Imune ao 'zoom: 0.8', prega a tela nas 4 bordas do ecrã)
        ================================================================== */
        .tab-caixa {
            position: absolute !important;
            top: 0 !important;
            bottom: 0 !important;
            left: 0 !important;
            right: 0 !important;
            padding: 0 !important;
            margin: 0 !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            display: none; 
            background: #f8fafc;
            z-index: 5;
        }

        .tab-caixa.active {
            display: block !important; 
        }

        .tab-caixa iframe {
            width: 100% !important;
            height: 100% !important; /* Preenche de cima a baixo */
            border: none !important;
            display: block !important;
            border-radius: 0 !important;
        }

        /* Layout do Chat */
        .chat-layout { display: none; flex-direction: column; height: calc(100vh - 80px); padding: 0; overflow: hidden; }
        .chat-layout.active { display: flex; }
        .chat-header-full { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #e2e8f0; background: #ffffff; border-radius: 8px 8px 0 0; }
        .chat-header-full h2 { margin: 0; color: #0f172a; font-size: 1.5rem; }
        .new-chat-btn { background-color: #10b981; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .new-chat-btn:hover { background-color: #059669; }

        .chat-messages-full { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background-color: #f8fafc; border: 1px solid #e2e8f0; margin-bottom: 10px; border-radius: 8px; }
        .ai-message, .user-message { padding: 15px; border-radius: 8px; max-width: 85%; font-size: 1rem; line-height: 1.5; }
        .ai-message { background: #e2e8f0; align-self: flex-start; color: #1e293b; }
        .user-message { background: #2563eb; color: white; align-self: flex-end; }

        .chat-input-full { display: flex; padding: 10px; background: white; border-top: 1px solid #e2e8f0; gap: 10px; }
        .chat-input-full input { flex: 1; padding: 15px; border: 1px solid #cbd5e1; border-radius: 5px; outline: none; font-size: 1rem; }
        .chat-input-full button { padding: 15px 30px; background: #2563eb; border: none; cursor: pointer; font-weight: bold; color: white; border-radius: 5px; transition: 0.3s; font-size: 1rem; }
        .chat-input-full button:hover { background: #1d4ed8; }

        #chat-tab.active {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px);
        }

        /* Tabela e Filtros de Conciliação */
        .filters-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .filters-container select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 5px; font-size: 1rem; outline: none; background-color: white; color: #1e293b; min-width: 200px; cursor: pointer; }
        .filters-container select:hover { border-color: #94a3b8; }

        .table-container { overflow-x: auto; background: white; border-radius: 8px; border: 1px solid #e2e8f0; }
        #tabelaConciliacao { width: 100%; border-collapse: collapse; text-align: left; }
        #tabelaConciliacao th, #tabelaConciliacao td { padding: 15px; border-bottom: 1px solid #e2e8f0; }
        #tabelaConciliacao th { background-color: #f8fafc; font-weight: 600; color: #475569; }
        #tabelaConciliacao tbody tr:hover { background-color: #f1f5f9; transition: 0.2s; }

        /* Cores de Status */
        .status-ok { color: #10b981; font-weight: bold; background: #d1fae5; padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; }
        .status-pendente { color: #ef4444; font-weight: bold; background: #fee2e2; padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>Hub Financeiro</h2>
        <nav>
            <button class="nav-btn active" onclick="showTab('conciliacao')">Conciliação Bancária</button>
            <button class="nav-btn" onclick="showTab('bancos')">Gestão de Bancos</button>
            <button class="nav-btn" onclick="showTab('caixa')">Gestão de Caixa</button>
            <button class="nav-btn" onclick="showTab('protestos')">Protestos</button>
            <hr style="border: 0; border-top: 1px solid #334155; margin: 15px 0;">
            <button class="nav-btn" onclick="showTab('chat-tab')">🤖 Assistente IA</button>
        </nav>
    </aside>

    <main class="content">
        
        <div id="conciliacao" class="tab-content active">
            <iframe src="conciliacao.html"></iframe>
        </div>

        <div id="bancos" class="tab-content">
            <iframe src="https://bank-management-lime.vercel.app/"></iframe>
        </div>

        <div id="caixa" class="tab-content tab-caixa">
            <iframe src="caixa.html"></iframe>
        </div>

        <div id="protestos" class="tab-content">
            <h1>Protestos</h1>
            <p>Procedimentos para baixas, cartas de anuência e negociações.</p>
        </div>

        <div id="chat-tab" class="tab-content">
            <div class="chat-header-full">
                <h2>Assistente Financeiro IA</h2>
                <button class="new-chat-btn" onclick="novoChat()">+ Novo Chat</button>
            </div>
            <div id="chatMessages" class="chat-messages-full">
                <p class="ai-message">Olá! Sou o assistente do Hub. Como posso ajudar hoje?</p>
            </div>
            <div class="chat-input-full">
                <input type="text" id="userInput" placeholder="Digite sua dúvida..." onkeypress="enviarComEnter(event)">
                <button onclick="sendMessage()">Enviar</button>
            </div>
        </div>

    </main>

    <script src="js/app.js"></script>
</body>
</html>
