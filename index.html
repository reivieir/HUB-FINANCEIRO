<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Financeiro - Dexco</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* AJUSTE DE VISUALIZAÇÃO CORRIGIDO */
        html {
            height: 100%;
            overflow: hidden; 
        }

        body {
            margin: 0;
            padding: 0;
            height: 100%;
            zoom: 0.8; 
            display: flex;
            background-color: #f8fafc;
        }

        /* Garante que o conteúdo ocupe o espaço correto e os iframes fiquem limpos */
        .tab-content iframe {
            width: 100%;
            height: calc(100vh - 120px);
            border: none;
            border-radius: 8px;
            background-color: #f8fafc;
        }
        
        .tab-content { 
            display: none; 
            padding: 10px; 
            width: 100%; 
            box-sizing: border-box;
            height: 100%; /* Adicionado para preencher o container */
        }
        
        .tab-content.active { 
            display: block; 
        }

        /* AJUSTE ESPECÍFICO PARA O CHAT NÃO CORTAR */
        #chat-tab.active {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px); /* Ajuste para o zoom de 80% */
        }

        .chat-messages-full {
            flex: 1; /* Faz as mensagens ocuparem o espaço central */
            overflow-y: auto; /* Habilita a rolagem se o texto for longo */
            padding: 20px;
            background: white;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
        }

        .chat-header-full {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .chat-input-full {
            display: flex;
            gap: 10px;
            background: white;
            padding: 10px;
            border-top: 1px solid #e2e8f0;
        }

        .chat-input-full input {
            flex: 1;
        }

        .content {
            flex: 1;
            overflow-x: hidden; 
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>Hub Financeiro</h2>
        <nav>
            <button class="nav-btn active" onclick="showTab('conciliacao')">Conciliação Bancária</button>
            <button class="nav-btn" onclick="showTab('bancos')">Gestão de Bancos</button>
            <button class="nav-btn" onclick="showTab('caixa')">Gestão de Caixa</button>
            <button class="nav-btn" onclick="showTab('protestos')">Protestos</button>
            <hr style="border: 0; border-top: 1px solid #334155; margin: 15px 0;">
            <button class="nav-btn" onclick="showTab('chat-tab')">🤖 Assistente IA</button>
        </nav>
    </aside>

    <main class="content">
        
        <div id="conciliacao" class="tab-content active">
            <iframe src="conciliacao.html"></iframe>
        </div>

        <div id="bancos" class="tab-content">
            <iframe src="https://bank-management-lime.vercel.app/"></iframe>
        </div>

       <div id="aba-caixa" class="tab-content tab-caixa">
    <iframe src="caixa.html"></iframe>
</div>

        <div id="protestos" class="tab-content">
            <h1>Protestos</h1>
            <p>Procedimentos para baixas, cartas de anuência e negociações.</p>
        </div>

        <div id="chat-tab" class="tab-content">
            <div class="chat-header-full">
                <h2>Assistente Financeiro IA</h2>
                <button class="new-chat-btn" onclick="novoChat()">+ Novo Chat</button>
            </div>
            <div id="chatMessages" class="chat-messages-full">
                <p class="ai-message">Olá! Sou o assistente do Hub. Como posso ajudar hoje?</p>
            </div>
            <div class="chat-input-full">
                <input type="text" id="userInput" placeholder="Digite sua dúvida..." onkeypress="enviarComEnter(event)">
                <button onclick="sendMessage()">Enviar</button>
            </div>
        </div>

    </main>

    <script src="js/app.js"></script>
</body>
</html>
