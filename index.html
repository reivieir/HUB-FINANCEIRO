<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Financeiro - Dexco</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        html, body {
            height: 100%;
            overflow: hidden; 
        }

        body {
            zoom: 0.8; /* HUB MANTIDO EM 80% EXATAMENTE COMO VOCÊ PEDIU */
            display: flex;
            background-color: #f8fafc;
        }

        /* Menu Lateral */
        .sidebar { width: 250px; background-color: #1e293b; color: white; padding: 20px; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { margin-bottom: 30px; font-size: 1.5rem; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .nav-btn { background: none; border: none; color: #cbd5e1; padding: 12px; text-align: left; cursor: pointer; border-radius: 5px; margin-bottom: 10px; font-size: 1rem; transition: 0.3s; width: 100%; }
        .nav-btn:hover, .nav-btn.active { background-color: #334155; color: white; }

        /* Container Principal do Hub */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column; /* Empurra as abas do topo até o rodapé */
            height: 100%;
            overflow: hidden; 
            position: relative;
        }

        /* Abas Genéricas */
        .tab-content { 
            display: none; 
            flex: 1; /* A aba preenche automaticamente toda a altura que sobrar */
            padding: 30px; 
            box-sizing: border-box;
            background: transparent;
        }
        
        .tab-content.active { 
            display: flex; 
            flex-direction: column;
        }

        .tab-content h1 { color: #0f172a; margin-bottom: 15px; }
        .tab-content p { color: #475569; }

        /* ==========================================================
           CONTROLE MATEMÁTICO DE ZOOM DOS IFRAMES
        ========================================================== */
        
        /* 1. Cápsula de Proteção: Corta as bordas brancas geradas pelo zoom */
        .iframe-wrapper {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: hidden; 
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            background: white;
        }

        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            border: none;
            background: white;
        }

        /* 2. Conciliação e Bancos (Visual final na tela: 70%) 
           Cálculo: Hub (0.8) * Iframe (0.875) = 0.70 */
        .iframe-70 {
            width: 114.28% !important;  /* 100 / 0.875 */
            height: 114.28% !important; /* 100 / 0.875 */
            transform: scale(0.875);
            transform-origin: top left;
        }

        /* 3. Aba Caixa sem padding para encostar nas laterais */
        .tab-caixa {
            padding: 0 !important; 
        }
        .tab-caixa .iframe-wrapper {
            border-radius: 0;
            box-shadow: none;
        }

        /* 4. Gestão de Caixa (Visual final na tela: 100% - Limpa o zoom do Hub)
           Cálculo: Hub (0.8) * Iframe (1.25) = 1.00 */
        .iframe-100 {
            width: 80% !important;  /* 100 / 1.25 */
            height: 80% !important; /* 100 / 1.25 */
            transform: scale(1.25);
            transform-origin: top left;
        }

        /* ==========================================================
           ESTILOS DO CHAT
        ========================================================== */
        .chat-messages-full { flex: 1; overflow-y: auto; padding: 20px; background: white; border-radius: 8px; margin-bottom: 10px; border: 1px solid #e2e8f0; }
        .chat-header-full { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .chat-header-full h2 { margin: 0; color: #0f172a; font-size: 1.5rem; }
        .new-chat-btn { background-color: #10b981; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .new-chat-btn:hover { background-color: #059669; }
        .chat-input-full { display: flex; gap: 10px; background: white; padding: 10px; border-top: 1px solid #e2e8f0; border-radius: 8px; }
        .chat-input-full input { flex: 1; padding: 15px; border: 1px solid #cbd5e1; border-radius: 5px; outline: none; font-size: 1rem; }
        .chat-input-full button { padding: 15px 30px; background: #2563eb; border: none; cursor: pointer; font-weight: bold; color: white; border-radius: 5px; transition: 0.3s; font-size: 1rem; }
        .chat-input-full button:hover { background: #1d4ed8; }
        .ai-message, .user-message { padding: 15px; border-radius: 8px; max-width: 85%; font-size: 1rem; line-height: 1.5; margin-bottom: 10px;}
        .ai-message { background: #e2e8f0; align-self: flex-start; color: #1e293b; }
        .user-message { background: #2563eb; color: white; align-self: flex-end; text-align: right; margin-left: auto; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>Hub Financeiro</h2>
        <nav>
            <button class="nav-btn active" onclick="showTab('conciliacao')">Conciliação Bancária</button>
            <button class="nav-btn" onclick="showTab('bancos')">Gestão de Bancos</button>
            <button class="nav-btn" onclick="showTab('caixa')">Gestão de Caixa</button>
            <button class="nav-btn" onclick="showTab('protestos')">Protestos</button>
            <hr style="border: 0; border-top: 1px solid #334155; margin: 15px 0;">
            <button class="nav-btn" onclick="showTab('chat-tab')">🤖 Assistente IA</button>
        </nav>
    </aside>

    <main class="content">
        
        <div id="conciliacao" class="tab-content active">
            <div class="iframe-wrapper">
                <iframe src="conciliacao.html" class="iframe-70"></iframe>
            </div>
        </div>

        <div id="bancos" class="tab-content">
            <div class="iframe-wrapper">
                <iframe src="https://bank-management-lime.vercel.app/" class="iframe-70"></iframe>
            </div>
        </div>

        <div id="caixa" class="tab-content tab-caixa">
            <div class="iframe-wrapper">
                <iframe src="caixa.html" class="iframe-100"></iframe>
            </div>
        </div>

        <div id="protestos" class="tab-content">
            <h1>Protestos</h1>
            <p>Procedimentos para baixas, cartas de anuência e negociações.</p>
        </div>

        <div id="chat-tab" class="tab-content">
            <div class="chat-header-full">
                <h2>Assistente Financeiro IA</h2>
                <button class="new-chat-btn" onclick="novoChat()">+ Novo Chat</button>
            </div>
            <div id="chatMessages" class="chat-messages-full">
                <p class="ai-message">Olá! Sou o assistente do Hub. Como posso ajudar hoje?</p>
            </div>
            <div class="chat-input-full">
                <input type="text" id="userInput" placeholder="Digite sua dúvida..." onkeypress="enviarComEnter(event)">
                <button onclick="sendMessage()">Enviar</button>
            </div>
        </div>

    </main>

    <script src="js/app.js"></script>
</body>
</html>
