<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Financeiro - Dexco</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #f0f2f5; --topbar-bg: #ffffff; --text-main: #1e293b; --text-light: #64748b; 
            --accent-color: #10b981; --border-color: #e2e8f0; --shadow-sm: 0 1px 3px rgba(0,0,0,0.05); 
        }
        
        html, body { 
            margin: 0; padding: 0; height: 100vh; overflow: hidden; 
            background-color: var(--bg-color); font-family: 'Inter', sans-serif; color: var(--text-main); 
        }
        
        body { 
            display: flex; flex-direction: column; zoom: 0.8; /* Hub a 80% */
        }

        /* Top Nav (Navegação Horizontal) */
        .top-navbar { 
            background-color: var(--topbar-bg); display: flex; align-items: center; justify-content: space-between; 
            padding: 0 30px; height: 65px; flex-shrink: 0; box-shadow: var(--shadow-sm); 
            border-bottom: 1px solid var(--border-color); z-index: 100; 
        }
        .logo { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 10px; color: #0f172a; }
        .logo span { color: var(--accent-color); }
        
        .nav-links { display: flex; gap: 5px; height: 100%; align-items: center; }
        .nav-btn { 
            background: transparent; border: none; color: var(--text-light); font-size: 0.9rem; font-weight: 500; 
            cursor: pointer; padding: 8px 14px; border-radius: 6px; transition: 0.2s; 
        }
        .nav-btn:hover { color: var(--text-main); background-color: #f8fafc; }
        .nav-btn.active { color: #2563eb; background-color: #eff6ff; font-weight: 600; }
        
        .user-profile { font-size: 0.85rem; color: var(--text-light); display: flex; align-items: center; gap: 10px; font-weight: 500; }
        .user-profile div { width: 32px; height: 32px; background-color: var(--accent-color); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Área de Conteúdo Limpa (Sem paddings, o iframe preenche 100%) */
        .content { flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; padding: 0; }
        .tab-content { display: none; flex: 1; padding: 0; background-color: transparent; }
        .tab-content.active { display: flex; flex-direction: column; }
        
        /* Iframes Perfeitos e Livres */
        .tab-content iframe { width: 100%; height: 100%; border: none; display: block; }

        /* Exceção para o Chat e Protestos (Que não são iframes) */
        #protestos, #chat-tab { margin: 25px; background: white; border-radius: 12px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-color); overflow: hidden; }
        #protestos { padding: 40px; }
        #protestos h1 { color: #0f172a; margin-top:0; margin-bottom: 10px; font-size: 1.5rem;}
        
        /* Chat Estilos */
        .chat-header-full { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; border-bottom: 1px solid var(--border-color); background: #fff;}
        .chat-header-full h2 { margin: 0; font-size: 1.25rem; font-weight: 600;}
        .new-chat-btn { background-color: var(--accent-color); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .chat-messages-full { flex: 1; overflow-y: auto; padding: 30px; background: #fafafa; display: flex; flex-direction: column; gap: 15px;}
        .ai-message, .user-message { padding: 12px 18px; border-radius: 8px; max-width: 80%; font-size: 0.95rem; line-height: 1.5; box-shadow: 0 1px 2px rgba(0,0,0,0.05);}
        .ai-message { background: white; align-self: flex-start; color: var(--text-main); border: 1px solid var(--border-color);}
        .user-message { background: #3b82f6; color: white; align-self: flex-end; }
        .chat-input-full { display: flex; gap: 10px; background: white; padding: 20px 30px; border-top: 1px solid var(--border-color); }
        .chat-input-full input { flex: 1; padding: 12px 15px; border: 1px solid var(--border-color); border-radius: 6px; outline: none;}
        .chat-input-full button { padding: 12px 25px; background: #3b82f6; border: none; cursor: pointer; font-weight: 600; color: white; border-radius: 6px;}
    </style>
</head>
<body>

    <header class="top-navbar">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #10b981;"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
            Hub <span>Financeiro</span>
        </div>
        
        <nav class="nav-links">
            <button class="nav-btn active" onclick="showTab('conciliacao')">Conciliação Bancária</button>
            <button class="nav-btn" onclick="showTab('bancos')">Gestão de Bancos</button>
            <button class="nav-btn" onclick="showTab('caixa')">Gestão de Caixa</button>
            <button class="nav-btn" onclick="showTab('protestos')">Protestos</button>
            <div style="width: 1px; height: 20px; background-color: #cbd5e1; margin: 0 5px;"></div>
            <button class="nav-btn" style="color: #10b981;" onclick="showTab('chat-tab')">✨ Assistente IA</button>
        </nav>

        <div class="user-profile">
            Olá, Reinaldo
            <div>R</div>
        </div>
    </header>

    <main class="content">
        
        <div id="conciliacao" class="tab-content active">
            <iframe src="conciliacao.html"></iframe>
        </div>

        <div id="bancos" class="tab-content">
            <iframe src="bancos.html"></iframe>
        </div>

        <div id="caixa" class="tab-content">
            <iframe src="caixa.html"></iframe>
        </div>

        <div id="protestos" class="tab-content">
            <h1>Protestos</h1>
            <p>Procedimentos para baixas, cartas de anuência e negociações.</p>
        </div>

        <div id="chat-tab" class="tab-content">
            <div class="chat-header-full">
                <h2>Assistente Financeiro IA</h2>
                <button class="new-chat-btn" onclick="novoChat()">+ Novo Chat</button>
            </div>
            <div id="chatMessages" class="chat-messages-full">
                <p class="ai-message">Olá! Sou o assistente do Hub. Analiso saldos, conciliações e regras de negócio. Como posso te ajudar hoje?</p>
            </div>
            <div class="chat-input-full">
                <input type="text" id="userInput" placeholder="Faça uma pergunta sobre o fluxo de caixa..." onkeypress="enviarComEnter(event)">
                <button onclick="sendMessage()">Enviar</button>
            </div>
        </div>

    </main>

    <script>
        // Função de navegação limpa
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // Funções do Chat IA
        function enviarComEnter(event) { if (event.key === 'Enter') sendMessage(); }
        function sendMessage() {
            let input = document.getElementById("userInput");
            let chat = document.getElementById("chatMessages");
            if (input.value.trim() === "") return;
            chat.innerHTML += `<p class="user-message">${input.value}</p>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;
        }
        function novoChat() { 
            document.getElementById("chatMessages").innerHTML = `<p class="ai-message">Olá! Sou o assistente do Hub. Como posso ajudar hoje?</p>`; 
        }
    </script>
</body>
</html>
