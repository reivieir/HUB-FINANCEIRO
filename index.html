<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub Financeiro - Dexco</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

html, body {
    height: 100%;
}

body {
    display: flex;
    background-color: #f8fafc;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    background-color: #1e293b;
    color: white;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

.sidebar h2 {
    margin-bottom: 30px;
    border-bottom: 1px solid #334155;
    padding-bottom: 10px;
}

.nav-btn {
    background: none;
    border: none;
    color: #cbd5e1;
    padding: 12px;
    text-align: left;
    cursor: pointer;
    border-radius: 5px;
    margin-bottom: 10px;
}

.nav-btn:hover,
.nav-btn.active {
    background-color: #334155;
    color: white;
}

/* CONTEÚDO */
.content {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
}

/* TABS */
.tab-content {
    display: none;
    flex: 1;
    width: 100%;
    height: 100%;
}

.tab-content.active {
    display: flex;
}

/* IFRAME */
.tab-content iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* CHAT */
.chat-layout {
    display: none;
    flex-direction: column;
    height: 100%;
}

.chat-layout.active {
    display: flex;
}

.chat-header {
    padding: 20px;
    background: white;
    border-bottom: 1px solid #e2e8f0;
}

.chat-messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

.chat-input {
    display: flex;
    padding: 10px;
    background: white;
    border-top: 1px solid #e2e8f0;
}

.chat-input input {
    flex: 1;
    padding: 10px;
}

.chat-input button {
    padding: 10px;
    background: #2563eb;
    color: white;
    border: none;
}
</style>
</head>

<body>

<aside class="sidebar">
    <h2>Hub Financeiro</h2>

    <button class="nav-btn active" onclick="showTab('conciliacao')">Conciliação</button>
    <button class="nav-btn" onclick="showTab('bancos')">Bancos</button>
    <button class="nav-btn" onclick="showTab('caixa')">Caixa</button>
    <button class="nav-btn" onclick="showTab('chat')">Chat IA</button>
</aside>

<main class="content">

    <div id="conciliacao" class="tab-content active">
        <iframe src="conciliacao.html"></iframe>
    </div>

    <div id="bancos" class="tab-content">
        <iframe src="https://bank-management-lime.vercel.app/"></iframe>
    </div>

    <div id="caixa" class="tab-content">
        <iframe src="caixa.html"></iframe>
    </div>

    <div id="chat" class="tab-content chat-layout">
        <div class="chat-header">Assistente IA</div>
        <div class="chat-messages">Olá! Como posso ajudar?</div>
        <div class="chat-input">
            <input type="text">
            <button>Enviar</button>
        </div>
    </div>

</main>

<script>
function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(tab => {
        tab.classList.remove('active');
    });

    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.remove('active');
    });

    document.getElementById(tabId).classList.add('active');

    event.target.classList.add('active');
}
</script>

</body>
</html>
