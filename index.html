<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dexco S.A - Gestão de Bancos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
   <style>
    :root { 
        --bg-color: #f0f2f5; --topbar-bg: #ffffff; --text-main: #1e293b; --text-light: #64748b; 
        --accent-color: #10b981; --border-color: #e2e8f0; --shadow-sm: 0 1px 3px rgba(0,0,0,0.05); 
    }
    html, body { margin: 0; padding: 0; height: 100vh; overflow: hidden; background-color: var(--bg-color); font-family: 'Inter', sans-serif; color: var(--text-main); }
    body { display: flex; flex-direction: column; zoom: 0.8; } /* Hub a 80% */

    /* Top Nav (Mantida idêntica) */
    .top-navbar { background-color: var(--topbar-bg); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; height: 65px; flex-shrink: 0; box-shadow: var(--shadow-sm); border-bottom: 1px solid var(--border-color); z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 10px; color: #0f172a; }
    .logo span { color: var(--accent-color); }
    .nav-links { display: flex; gap: 5px; height: 100%; align-items: center; }
    .nav-btn { background: transparent; border: none; color: var(--text-light); font-size: 0.9rem; font-weight: 500; cursor: pointer; padding: 8px 14px; border-radius: 6px; transition: 0.2s; }
    .nav-btn:hover { color: var(--text-main); background-color: #f8fafc; }
    .nav-btn.active { color: #2563eb; background-color: #eff6ff; font-weight: 600; }
    .user-profile { font-size: 0.85rem; color: var(--text-light); display: flex; align-items: center; gap: 10px; font-weight: 500; }
    .user-profile div { width: 32px; height: 32px; background-color: var(--accent-color); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

    /* Área de Conteúdo Limpa (Sem paddings, o iframe preenche 100%) */
    .content { flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; padding: 0; }
    .tab-content { display: none; flex: 1; padding: 0; background-color: transparent; }
    .tab-content.active { display: flex; flex-direction: column; }
    
    /* Iframes Perfeitos e Livres */
    .tab-content iframe { width: 100%; height: 100%; border: none; display: block; }

    /* Exceção para o Chat e Protestos (Que não são iframes) */
    #protestos, #chat-tab { margin: 25px; background: white; border-radius: 12px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-color); overflow: hidden; }
    #protestos { padding: 40px; }
    #protestos h1 { color: #0f172a; margin-top:0; margin-bottom: 10px; font-size: 1.5rem;}
    
    /* Chat Estilos */
    .chat-header-full { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; border-bottom: 1px solid var(--border-color); background: #fff;}
    .chat-header-full h2 { margin: 0; font-size: 1.25rem; font-weight: 600;}
    .new-chat-btn { background-color: var(--accent-color); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .chat-messages-full { flex: 1; overflow-y: auto; padding: 30px; background: #fafafa; display: flex; flex-direction: column; gap: 15px;}
    .ai-message, .user-message { padding: 12px 18px; border-radius: 8px; max-width: 80%; font-size: 0.95rem; line-height: 1.5; box-shadow: 0 1px 2px rgba(0,0,0,0.05);}
    .ai-message { background: white; align-self: flex-start; color: var(--text-main); border: 1px solid var(--border-color);}
    .user-message { background: #3b82f6; color: white; align-self: flex-end; }
    .chat-input-full { display: flex; gap: 10px; background: white; padding: 20px 30px; border-top: 1px solid var(--border-color); }
    .chat-input-full input { flex: 1; padding: 12px 15px; border: 1px solid var(--border-color); border-radius: 6px; outline: none;}
    .chat-input-full button { padding: 12px 25px; background: #3b82f6; border: none; cursor: pointer; font-weight: 600; color: white; border-radius: 6px;}
</style>
</head>

<body>

    <div id="login-screen">
        <div class="login-card">
            <h2>DEXCO ASSIST</h2>
            <p>Gestão de Acessos Bancários</p>
            <input type="password" id="pass" placeholder="Senha do Sistema" onkeypress="handleEnter(event)">
            <button onclick="entrar()">ENTRAR NO PAINEL</button>
            <p id="login-msg" style="color: #c40000; font-size: 12px; margin-top: 15px; height: 15px;"></p>
        </div>
    </div>

    <div id="app">
        
        <header>
            <h1>Dexco S.A - Gestão de Bancos</h1>
            <div class="header-actions">
                <button class="btn-export" onclick="exportarExcel()">Exportar CSV</button>
                <button class="btn-lock" onclick="sair()">Sair / Bloquear</button>
            </div>
        </header>

        <div class="nav-bancos" id="nav-bancos"></div>

        <div class="main-container">
            <div class="kpis">
                <div class="kpi-card">TOTAL GERAL<br><span class="kpi" id="total">0</span></div>
                <div class="kpi-card"><span id="kpi-label-filtrado">TODOS</span><br><span class="kpi" id="total-banco" style="color: var(--link);">0</span></div>
            </div>

            <div class="controls">
                <input type="text" id="busca" placeholder="Buscar por operador ou empresa..." oninput="render()" style="flex: 1;">
                <select id="filtro-perfil" onchange="filtrarPerfil()"><option value="">Todos os perfis</option></select>
                <button class="btn-incluir" onclick="abrirModal()">+ INCLUIR NOVO</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Operador</th>
                            <th>Perfil</th>
                            <th>Usuário</th>
                            <th>Banco</th>
                            <th>Empresa</th>
                            <th style="width: 150px; text-align: center;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-tabela"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-titulo">Incluir / Editar Acesso</h3>
            <input type="hidden" id="e-id">
            <input type="text" id="i-nome" placeholder="Operador">
            <input type="text" id="i-perfil" placeholder="Perfil (Ex: Master, Consulta)">
            <input type="text" id="i-user" placeholder="Usuário">
            <input type="text" id="i-banco" placeholder="Banco">
            <input type="text" id="i-empresa" placeholder="Empresa">
            
            <div class="modal-btns">
                <button class="btn-save" onclick="salvar()">SALVAR</button>
                <button class="btn-cancel" onclick="fechar()">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://spcpujmqnjtalupxzqpp.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwY3B1am1xbmp0YWx1cHh6cXBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MjI3ODMsImV4cCI6MjA4ODI5ODc4M30.TYVtILJNISNR3aDejRM5fsWKt9TuIHgN1dS2deVbQwQ";
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let dados = [];
        let bancoSelecionado = "";
        let perfilSelecionado = "";

        function entrar() {
            const passInput = document.getElementById("pass");
            const senha = passInput.value.trim();
            if (senha === "Dexco2026") {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("app").style.display = "block";
                carregar();
            } else {
                document.getElementById("login-msg").innerText = "Acesso negado!";
                passInput.value = "";
                passInput.focus();
            }
        }

        function handleEnter(e) { if(e.key === "Enter") entrar(); }
        function sair() { location.reload(); }

        async function carregar() {
            const { data, error } = await sb.from("gestao_acessos").select("*");
            if (error) { alert("Erro de conexão: " + error.message); return; }
            dados = data || [];
            render();
        }

        function render() {
            const busca = document.getElementById("busca").value.toLowerCase();
            let lista = dados.filter(i => {
                const operador = i.operador_nome ? i.operador_nome.toLowerCase() : "";
                const empresa = i.empresa ? i.empresa.toLowerCase() : "";
                const matchBusca = operador.includes(busca) || empresa.includes(busca);
                const matchBanco = bancoSelecionado === "" || i.banco_nome === bancoSelecionado;
                const matchPerfil = perfilSelecionado === "" || i.perfil === perfilSelecionado;
                return matchBusca && matchBanco && matchPerfil;
            });

            document.getElementById("total").innerText = dados.length;
            document.getElementById("total-banco").innerText = lista.length;
            document.getElementById("kpi-label-filtrado").innerText = bancoSelecionado ? bancoSelecionado.toUpperCase() : "TODOS";

            document.getElementById("corpo-tabela").innerHTML = lista.map(i => `
                <tr>
                    <td style="font-weight: 600;">${i.operador_nome || ""}</td>
                    <td>${i.perfil || ""}</td>
                    <td>${i.usuario_login || ""}</td>
                    <td>${i.banco_nome || ""}</td>
                    <td>${i.empresa || ""}</td>
                    <td style="text-align: center;">
                        <a class="action-link" onclick="editar('${i.id}','${i.operador_nome}','${i.perfil}','${i.usuario_login}','${i.banco_nome}','${i.empresa}')">Editar</a>
                        <span style="color:#ddd">|</span>
                        <a class="action-link link-delete" onclick="remover('${i.id}')">Excluir</a>
                    </td>
                </tr>
            `).join("");

            atualizarNavegacao();
        }

        function atualizarNavegacao() {
            const todosBancos = [...new Set(dados.map(i => i.banco_nome).filter(Boolean))].sort();
            const nav = document.getElementById("nav-bancos");
            
            // Botão TODOS
            let html = `<div class="banco-link ${bancoSelecionado === "" ? 'ativo' : ''}" onclick="selecionarBanco('')">TODOS</div>`;
            
            // Demais bancos gerados dinamicamente
            html += todosBancos.map(b => `<div class="banco-link ${b === bancoSelecionado ? 'ativo' : ''}" onclick="selecionarBanco('${b}')">${b.toUpperCase()}</div>`).join("");
            
            nav.innerHTML = html;

            // Filtro de perfis
            const dadosParaPerfis = bancoSelecionado ? dados.filter(i => i.banco_nome === bancoSelecionado) : dados;
            const perfis = [...new Set(dadosParaPerfis.map(i => i.perfil).filter(Boolean))].sort();
            document.getElementById("filtro-perfil").innerHTML = `<option value="">Todos perfis</option>` +
                perfis.map(p => `<option value="${p}" ${p === perfilSelecionado ? 'selected' : ''}>${p}</option>`).join("");
        }

        function selecionarBanco(b) { bancoSelecionado = b; render(); }
        function filtrarPerfil() { perfilSelecionado = document.getElementById("filtro-perfil").value; render(); }

        function abrirModal() {
            document.getElementById("modal").style.display = "flex";
            document.getElementById("modal-titulo").innerText = "Cadastro";
            document.getElementById("e-id").value = "";
            document.getElementById("i-nome").value = "";
            document.getElementById("i-perfil").value = "";
            document.getElementById("i-user").value = "";
            document.getElementById("i-banco").value = bancoSelecionado;
            document.getElementById("i-empresa").value = "";
        }
        
        function fechar() { document.getElementById("modal").style.display = "none"; }

        async function salvar() {
            const id = document.getElementById("e-id").value;
            const obj = {
                operador_nome: document.getElementById("i-nome").value,
                perfil: document.getElementById("i-perfil").value,
                usuario_login: document.getElementById("i-user").value,
                banco_nome: document.getElementById("i-banco").value,
                empresa: document.getElementById("i-empresa").value
            };
            if (!obj.operador_nome || !obj.banco_nome) { alert("Operador e Banco são obrigatórios"); return; }
            
            const res = id ? await sb.from("gestao_acessos").update(obj).eq("id", id) : await sb.from("gestao_acessos").insert([obj]);
            
            if (res.error) alert("Erro ao salvar: " + res.error.message); 
            else { fechar(); carregar(); }
        }

        function editar(id, n, p, u, b, e) {
            abrirModal();
            document.getElementById("modal-titulo").innerText = "Editar Cadastro";
            document.getElementById("e-id").value = id;
            document.getElementById("i-nome").value = n;
            document.getElementById("i-perfil").value = p;
            document.getElementById("i-user").value = u;
            document.getElementById("i-banco").value = b;
            document.getElementById("i-empresa").value = e;
        }

        async function remover(id) {
            if (!confirm("Confirmar exclusão?")) return;
            const { error } = await sb.from("gestao_acessos").delete().eq("id", id);
            if (error) alert(error.message); else carregar();
        }

        function exportarExcel() {
            let csv = "\uFEFFOPERADOR;PERFIL;USUARIO;BANCO;EMPRESA\n";
            dados.forEach(i => { csv += `${i.operador_nome||""};${i.perfil||""};${i.usuario_login||""};${i.banco_nome||""};${i.empresa||""}\n`; });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = "gestao_dexco.csv";
            link.click();
        }
    </script>
</body>
</html>
