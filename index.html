<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Financeiro - Dexco</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* AJUSTE DE VISUALIZAÇÃO CORRIGIDO E DEFINITIVO */
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh; /* Trava a altura na tela real */
            overflow: hidden; /* Corta rolagem dupla no hub */
            background-color: #f8fafc;
        }

        body {
            display: flex;
            /* SE O ZOOM ESTIVER QUEBRANDO A TELA, EXPERIMENTE REMOVER OU COMENTAR ESTA LINHA: */
            /* zoom: 0.8; */ 
        }

        /* Sidebar Padrão */
        .sidebar {
            width: 250px;
            background-color: #1e293b;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar h2 { margin-bottom: 30px; font-size: 1.5rem; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .nav-btn { background: none; border: none; color: #cbd5e1; padding: 12px; text-align: left; cursor: pointer; border-radius: 5px; margin-bottom: 10px; font-size: 1rem; transition: 0.3s; width: 100%; }
        .nav-btn:hover, .nav-btn.active { background-color: #334155; color: white; }

        /* AQUI ESTÁ O SEGREDO: O Content como container Flex vertical */
        .content {
            flex: 1; /* Ocupa o resto da largura */
            display: flex;
            flex-direction: column; /* Organiza os filhos empilhados */
            height: 100vh;
            overflow: hidden; /* Impede a rolagem do container pai */
        }

        /* Containers de Abas Padrões */
        .tab-content { 
            display: none; 
            flex: 1; /* Estica para preencher toda a altura disponível da .content */
            padding: 20px; /* Padding geral para o conteúdo não colar nas bordas */
            box-sizing: border-box;
            background-color: #f4f7f6;
            overflow-y: auto; /* Rolagem interna das abas genéricas */
        }
        
        .tab-content.active { 
            display: flex; 
            flex-direction: column;
        }

        /* Iframes padrão */
        .tab-content iframe {
            width: 100%;
            flex: 1; /* Estica o Iframe internamente */
            border: none;
            border-radius: 8px;
            background-color: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* ==========================================================
           CLASSE EXCLUSIVA PARA A ABA "GESTÃO DE CAIXA"
           Ignora as bordas (padding: 0) e encosta em todos os lados!
        ========================================================== */
        .tab-caixa {
            padding: 0 !important; /* Retira as bordas da aba */
            overflow: hidden !important; /* Desativa a rolagem desta aba, o iframe resolve */
        }
        
        .tab-caixa iframe {
            border-radius: 0 !important; /* Fica quadrado e liso nas bordas */
            box-shadow: none !important;
        }

        /* Ajustes do Chat */
        #chat-tab.active { display: flex; flex-direction: column; height: 100%; }
        .chat-messages-full { flex: 1; overflow-y: auto; padding: 20px; background: white; border-radius: 8px; margin-bottom: 10px; border: 1px solid #e2e8f0; }
        .chat-header-full { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .chat-input-full { display: flex; gap: 10px; background: white; padding: 10px; border-top: 1px solid #e2e8f0; }
        .chat-input-full input { flex: 1; }
/* ==========================================================
   CONTROLE DE ZOOM INDIVIDUAL DOS IFRAMES
========================================================== */

/* 1. Conciliação e Gestão de Bancos em 70% */
#conciliacao iframe, #bancos iframe {
    width: 142.85% !important; /* 100 / 0.85 = 142.85% (Compensa o encolhimento) */
    height: calc((100vh - 120px) * 1.4285) !important; /* Compensa a altura */
    transform: scale(0.85);
    transform-origin: top left; /* Garante que o zoom encolha em direção ao topo esquerdo */
    border: none;
    border-radius: 12px; /* Ajuste visual para a borda não ficar pontiaguda no scale */
}

/* 2. Gestão de Caixa em 100% (Sem redução) */
.tab-caixa iframe {
    width: 90% !important;
    height: 90% !important;
    transform: none !important; /* Garante que não sofra nenhuma alteração */
}
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>Hub Financeiro</h2>
        <nav>
            <button class="nav-btn active" onclick="showTab('conciliacao')">Conciliação Bancária</button>
            <button class="nav-btn" onclick="showTab('bancos')">Gestão de Bancos</button>
            <button class="nav-btn" onclick="showTab('caixa')">Gestão de Caixa</button>
            <button class="nav-btn" onclick="showTab('protestos')">Protestos</button>
            <hr style="border: 0; border-top: 1px solid #334155; margin: 15px 0;">
            <button class="nav-btn" onclick="showTab('chat-tab')">🤖 Assistente IA</button>
        </nav>
    </aside>

    <main class="content">
        
        <div id="conciliacao" class="tab-content active">
            <iframe src="conciliacao.html"></iframe>
        </div>

        <div id="bancos" class="tab-content">
            <iframe src="https://bank-management-lime.vercel.app/"></iframe>
        </div>

        <div id="caixa" class="tab-content tab-caixa">
            <iframe src="caixa.html"></iframe>
        </div>

        <div id="protestos" class="tab-content">
            <h1>Protestos</h1>
            <p>Procedimentos para baixas, cartas de anuência e negociações.</p>
        </div>

        <div id="chat-tab" class="tab-content">
            <div class="chat-header-full">
                <h2>Assistente Financeiro IA</h2>
                <button class="new-chat-btn" onclick="novoChat()">+ Novo Chat</button>
            </div>
            <div id="chatMessages" class="chat-messages-full">
                <p class="ai-message">Olá! Sou o assistente do Hub. Como posso ajudar hoje?</p>
            </div>
            <div class="chat-input-full">
                <input type="text" id="userInput" placeholder="Digite sua dúvida..." onkeypress="enviarComEnter(event)">
                <button onclick="sendMessage()">Enviar</button>
            </div>
        </div>

    </main>

    <script src="js/app.js"></script>
</body>
</html>
