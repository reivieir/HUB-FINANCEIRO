<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Conciliação Bancária - Dexco</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary: #002b45; 
            --danger: #c40000; 
            --success: #10b981; 
            --border: #e2e8f0;
            --text-main: #1e293b;
        }
        
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #f8fafc; 
            padding: 20px; 
            color: var(--text-main);
        }

        /* NAVEGAÇÃO HORIZONTAL DE BANCOS (Estilo Gestão de Bancos) */
        .nav-bancos { 
            background: white; 
            padding: 10px 25px; 
            display: flex; 
            gap: 15px; 
            border-bottom: 1px solid var(--border); 
            margin: -20px -20px 20px -20px; 
            overflow-x: auto;
        }
        .banco-link { 
            padding: 10px 20px; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 6px; 
            color: #64748b; 
            text-transform: uppercase;
            font-size: 13px;
            transition: 0.2s;
            white-space: nowrap;
        }
        .banco-link.ativo { background: var(--primary); color: white; }
        .banco-link:hover:not(.ativo) { background: #f1f5f9; }

        /* CARDS DE KPI */
        .kpis { display: flex; gap: 20px; margin-bottom: 20px; }
        .kpi-card { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            flex: 1; 
            border: 1px solid var(--border); 
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .kpi-title { font-size: 12px; font-weight: bold; color: #64748b; text-transform: uppercase; margin-bottom: 5px; }
        .kpi { font-size: 32px; color: var(--danger); font-weight: bold; }

        /* CONTROLES */
        .controls { display: flex; gap: 12px; margin-bottom: 15px; }
        .search-input { 
            flex: 1; 
            padding: 12px; 
            border: 1px solid var(--border); 
            border-radius: 6px; 
            font-size: 14px;
        }
        .btn-add { 
            background: var(--success); 
            color: white; 
            border: none; 
            padding: 0 25px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-add:hover { opacity: 0.9; }

        /* TABELA */
        .table-container { background: white; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { 
            background: #f1f5f9; 
            padding: 15px; 
            text-align: left; 
            font-size: 11px; 
            color: #475569; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 13px; }
        tr:hover td { background: #f8fafc; }

        /* AÇÕES */
        .action-link { color: #2563eb; cursor: pointer; text-decoration: none; font-weight: 500; }
        .action-link:hover { text-decoration: underline; }
        .delete-link { color: #ef4444; margin-left: 10px; }

        /* MODAL */
        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.5); 
            justify-content: center; 
            align-items: center; 
            z-index: 1000; 
        }
        .modal-content { 
            background: white; 
            padding: 30px; 
            border-radius: 10px; 
            width: 500px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }
        .modal-content h3 { margin-top: 0; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .modal-field { display: flex; flex-direction: column; gap: 5px; }
        .modal-field label { font-size: 12px; font-weight: bold; color: #64748b; }
        .modal-field input { padding: 10px; border: 1px solid var(--border); border-radius: 5px; }
        .modal-footer { display: flex; gap: 10px; margin-top: 25px; }
        .btn-save { flex: 1; padding: 12px; background: var(--success); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-cancel { flex: 1; padding: 12px; background: #94a3b8; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="nav-bancos" id="nav-bancos">
        </div>

    <div class="kpis">
        <div class="kpi-card">
            <div class="kpi-title">Total Geral</div>
            <div class="kpi" id="total">0</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-title" id="kpi-label">Todos</div>
            <div class="kpi" id="total-f">0</div>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="busca" class="search-input" placeholder="Buscar por Empresa ou CNPJ..." oninput="render()">
        <button class="btn-add" onclick="abrirModal()">+ INCLUIR NOVO</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Empresa</th>
                    <th>Contas</th>
                    <th>CNPJ</th>
                    <th>Banco</th>
                    <th>Razão Débito</th>
                    <th>Razão Crédito</th>
                    <th>Razão Movimento</th>
                    <th style="text-align:center">Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo">
                </tbody>
        </table>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-titulo">Nova Configuração</h3>
            <input type="hidden" id="m-id">
            
            <div class="modal-field">
                <label>Nome da Empresa</label>
                <input type="text" id="m-empresa">
            </div>

            <div class="modal-grid">
                <div class="modal-field">
                    <label>Número da Conta</label>
                    <input type="text" id="m-conta">
                </div>
                <div class="modal-field">
                    <label>CNPJ</label>
                    <input type="text" id="m-cnpj">
                </div>
            </div>

            <div class="modal-field" style="margin-top:15px">
                <label>Banco</label>
                <input type="text" id="m-banco">
            </div>

            <div class="modal-grid">
                <div class="modal-field">
                    <label>Razão Débito</label>
                    <input type="text" id="m-raz-deb">
                </div>
                <div class="modal-field">
                    <label>Razão Crédito</label>
                    <input type="text" id="m-raz-cre">
                </div>
            </div>

            <div class="modal-field" style="margin-top:15px">
                <label>Razão Movimento</label>
                <input type="text" id="m-raz-mov">
            </div>

            <div class="modal-footer">
                <button class="btn-save" onclick="salvar()">SALVAR DADOS</button>
                <button class="btn-cancel" onclick="fecharModal()">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES SUPABASE
        const SUPABASE_URL = "https://spcpujmqnjtalupxzqpp.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwY3B1am1xbmp0YWx1cHh6cXBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDEyMDIzNjIsImV4cCI6MjA1NjY2MjM2Mn0.C-w6W307mXkG6rA369qD3y6m3R5y3m6m3R5y3m6m3R5y3m"; 
        
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let dados = [];
        let bancoSel = "";

        // CARREGAR DADOS
        async function carregar() {
            const { data, error } = await sb.from("conciliacao_bancaria").select("*");
            if (error) {
                console.error("Erro Supabase:", error.message);
                return;
            }
            dados = data || [];
            render();
        }

        // RENDERIZAR INTERFACE
        function render() {
            const busca = document.getElementById("busca").value.toLowerCase();
            
            let lista = dados.filter(i => {
                const matchBusca = (i.empresa_nome?.toLowerCase().includes(busca) || i.cnpj?.includes(busca));
                const matchBanco = (bancoSel === "" || i.banco_nome === bancoSel);
                return matchBusca && matchBanco;
            });

            document.getElementById("total").innerText = dados.length;
            document.getElementById("total-f").innerText = lista.length;
            document.getElementById("kpi-label").innerText = bancoSel ? bancoSel.toUpperCase() : "TODOS";

            const corpo = document.getElementById("tabelaCorpo");
            corpo.innerHTML = lista.map(i => `
                <tr>
                    <td>${i.empresa_nome || ""}</td>
                    <td>${i.conta_numero || ""}</td>
                    <td>${i.cnpj || ""}</td>
                    <td>${i.banco_nome || ""}</td>
                    <td>${i.conta_razao_debito || ""}</td>
                    <td>${i.conta_razao_credito || ""}</td>
                    <td>${i.conta_razao_movimento || ""}</td>
                    <td style="text-align:center">
                        <a class="action-link" onclick="prepararEdicao('${i.id}')">Editar</a>
                        <a class="action-link delete-link" onclick="remover('${i.id}')">Excluir</a>
                    </td>
                </tr>
            `).join("");

            atualizarNavegacao();
        }

        // ATUALIZAR ABAS DE BANCO
        function atualizarNavegacao() {
            const bancosUnicos = [...new Set(dados.map(i => i.banco_nome).filter(Boolean))].sort();
            const nav = document.getElementById("nav-bancos");
            
            let html = `<div class="banco-link ${bancoSel === '' ? 'ativo' : ''}" onclick="setBanco('')">TODOS</div>`;
            html += bancosUnicos.map(b => `
                <div class="banco-link ${b === bancoSel ? 'ativo' : ''}" onclick="setBanco('${b}')">
                    ${b.toUpperCase()}
                </div>
            `).join("");
            
            nav.innerHTML = html;
        }

        function setBanco(b) {
            bancoSel = b;
            render();
        }

        // MODAL ACTIONS
        function abrirModal() {
            document.getElementById("modal-titulo").innerText = "Nova Configuração";
            document.getElementById("m-id").value = "";
            document.getElementById("m-empresa").value = "";
            document.getElementById("m-conta").value = "";
            document.getElementById("m-cnpj").value = "";
            document.getElementById("m-banco").value = bancoSel; // Pré-seleciona o banco filtrado
            document.getElementById("m-raz-deb").value = "";
            document.getElementById("m-raz-cre").value = "";
            document.getElementById("m-raz-mov").value = "";
            document.getElementById("modal").style.display = "flex";
        }

        function fecharModal() {
            document.getElementById("modal").style.display = "none";
        }

        // CRUD: SALVAR (INSERT / UPDATE)
        async function salvar() {
            const id = document.getElementById("m-id").value;
            const payload = {
                empresa_nome: document.getElementById("m-empresa").value,
                conta_numero: document.getElementById("m-conta").value,
                cnpj: document.getElementById("m-cnpj").value,
                banco_nome: document.getElementById("m-banco").value,
                conta_razao_debito: document.getElementById("m-raz-deb").value,
                conta_razao_credito: document.getElementById("m-raz-cre").value,
                conta_razao_movimento: document.getElementById("m-raz-mov").value
            };

            if (!payload.empresa_nome || !payload.banco_nome) {
                alert("Por favor, preencha pelo menos a Empresa e o Banco.");
                return;
            }

            let res;
            if (id) {
                res = await sb.from("conciliacao_bancaria").update(payload).eq("id", id);
            } else {
                res = await sb.from("conciliacao_bancaria").insert([payload]);
            }

            if (res.error) alert("Erro ao salvar: " + res.error.message);
            else {
                fecharModal();
                carregar();
            }
        }

        // CRUD: PREPARAR EDIÇÃO
        function prepararEdicao(id) {
            const item = dados.find(d => d.id === id);
            if (!item) return;

            document.getElementById("modal-titulo").innerText = "Editar Configuração";
            document.getElementById("m-id").value = item.id;
            document.getElementById("m-empresa").value = item.empresa_nome || "";
            document.getElementById("m-conta").value = item.conta_numero || "";
            document.getElementById("m-cnpj").value = item.cnpj || "";
            document.getElementById("m-banco").value = item.banco_nome || "";
            document.getElementById("m-raz-deb").value = item.conta_razao_debito || "";
            document.getElementById("m-raz-cre").value = item.conta_razao_credito || "";
            document.getElementById("m-raz-mov").value = item.conta_razao_movimento || "";
            
            document.getElementById("modal").style.display = "flex";
        }

        // CRUD: REMOVER
        async function remover(id) {
            if (!confirm("Tem certeza que deseja excluir esta configuração de conciliação?")) return;
            const { error } = await sb.from("conciliacao_bancaria").delete().eq("id", id);
            if (error) alert(error.message);
            else carregar();
        }

        // Inicialização
        carregar();
    </script>
</body>
</html>
