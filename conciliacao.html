<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Conciliação Bancária - Dexco</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary: #002b45; 
            --danger: #c40000; 
            --success: #10b981; 
            --border: #e2e8f0;
        }
        
        body { margin: 0; font-family: Arial, sans-serif; background: #f8fafc; padding: 0; }

        /* CABEÇALHO */
        .header-blue {
            background-color: var(--primary);
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header-title { font-size: 16px; font-weight: normal; }
        .header-btns { display: flex; gap: 10px; }
        
        .btn-export {
            background: white;
            color: black;
            border: 1px solid #ccc;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 13px;
            border-radius: 2px;
        }
        .btn-logout {
            background: var(--danger);
            color: white;
            border: none;
            padding: 5px 15px;
            cursor: pointer;
            font-size: 13px;
            border-radius: 4px;
            font-weight: bold;
        }

        /* CONTEÚDO */
        .container { padding: 0 20px 20px 20px; }

        .nav-bancos { 
            background: white; padding: 10px 25px; display: flex; gap: 15px; 
            border-bottom: 1px solid var(--border); margin: 0 -20px 20px -20px; overflow-x: auto;
        }
        .banco-link { 
            padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 6px; 
            color: #64748b; text-transform: uppercase; font-size: 13px; white-space: nowrap;
        }
        .banco-link.ativo { background: var(--primary); color: white; }

        .kpis { display: flex; gap: 20px; margin-bottom: 20px; }
        .kpi-card { background: white; padding: 20px; border-radius: 8px; flex: 1; border: 1px solid var(--border); }
        .kpi { font-size: 32px; color: var(--danger); font-weight: bold; }

        .controls { display: flex; gap: 12px; margin-bottom: 15px; }
        .search-input { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 6px; }
        .btn-add { background: var(--success); color: white; border: none; padding: 0 25px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
        th { background: #f1f5f9; padding: 15px; text-align: left; font-size: 11px; color: #475569; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 13px; }

        .action-link { color: #2563eb; cursor: pointer; text-decoration: none; font-weight: bold; font-size: 12px; }
        .delete-link { color: #ef4444; margin-left: 10px; }
        
        .btn-unlock-top {
            background: none; border: 1px solid #cbd5e1; padding: 4px 8px; border-radius: 4px;
            cursor: pointer; font-size: 10px; font-weight: bold; color: #64748b; margin-left: 10px;
        }
        .status-locked { color: #94a3b8; font-style: italic; font-size: 11px; }

        /* MODAIS */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 500px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .modal-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        .modal-field label { font-size: 12px; font-weight: bold; color: #64748b; }
        .modal-field input { padding: 10px; border: 1px solid var(--border); border-radius: 5px; font-size: 14px; }
        .modal-footer { display: flex; gap: 10px; margin-top: 20px; }
        .btn-save { flex: 1; padding: 12px; background: var(--success); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-cancel { flex: 1; padding: 12px; background: #94a3b8; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* ESTILO ESPECÍFICO MODAL SENHA */
        .btn-confirm { flex: 1; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-blue">
        <div class="header-title">Dexco S.A - Conciliação Bancária</div>
        <div class="header-btns">
            <button class="btn-export" onclick="exportarCSV()">Exportar CSV</button>
            <button class="btn-logout" onclick="window.parent.location.reload()">Sair / Bloquear</button>
        </div>
    </div>

    <div class="container">
        <div class="nav-bancos" id="nav-bancos"></div>

        <div class="kpis">
            <div class="kpi-card">TOTAL GERAL<br><span class="kpi" id="total">0</span></div>
            <div class="kpi-card"><span id="kpi-label">TODOS</span><br><span class="kpi" id="total-f">0</span></div>
        </div>

        <div class="controls">
            <input type="text" id="busca" class="search-input" placeholder="Buscar Empresa ou CNPJ..." oninput="render()">
            <button class="btn-add" onclick="abrirModal()">+ INCLUIR NOVO</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Empresa</th><th>Contas</th><th>CNPJ</th><th>Banco</th><th>Razão Débito</th><th>Razão Crédito</th><th>Razão Mov.</th>
                    <th style="text-align:center">
                        Ações 
                        <button id="btnUnlock" class="btn-unlock-top" onclick="abrirModalSeguranca()">🔓 DESBLOQUEAR</button>
                    </th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo"></tbody>
        </table>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-titulo" style="margin-top:0; color:var(--primary)">Nova Configuração</h3>
            <input type="hidden" id="m-id">
            <div class="modal-field"><label>Empresa</label><input type="text" id="m-empresa"></div>
            <div class="modal-grid">
                <div class="modal-field"><label>Conta</label><input type="text" id="m-conta"></div>
                <div class="modal-field"><label>CNPJ</label><input type="text" id="m-cnpj"></div>
            </div>
            <div class="modal-field"><label>Banco</label><input type="text" id="m-banco"></div>
            <div class="modal-grid">
                <div class="modal-field"><label>Razão Débito</label><input type="text" id="m-raz-deb"></div>
                <div class="modal-field"><label>Razão Crédito</label><input type="text" id="m-raz-cre"></div>
            </div>
            <div class="modal-field"><label>Razão Movimento</label><input type="text" id="m-raz-mov"></div>
            <div class="modal-footer">
                <button class="btn-save" onclick="salvar()">SALVAR</button>
                <button class="btn-cancel" onclick="fecharModal()">CANCELAR</button>
            </div>
        </div>
    </div>

    <div id="modal-seguranca" class="modal">
        <div class="modal-content" style="width: 320px; text-align: center;">
            <h3 style="margin-top:0; color:var(--primary)">Acesso Restrito</h3>
            <p style="font-size: 13px; color: #64748b; margin-bottom: 20px;">Digite a senha para habilitar edições</p>
            <div class="modal-field">
                <input type="password" id="input-senha-segura" placeholder="Senha do Sistema" onkeypress="if(event.key==='Enter') validarSenhaSegura()">
            </div>
            <div class="modal-footer">
                <button class="btn-confirm" onclick="validarSenhaSegura()">CONFIRMAR</button>
                <button class="btn-cancel" onclick="fecharModalSeguranca()">VOLTAR</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://spcpujmqnjtalupxzqpp.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwY3B1am1xbmp0YWx1cHh6cXBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MjI3ODMsImV4cCI6MjA4ODI5ODc4M30.TYVtILJNISNR3aDejRM5fsWKt9TuIHgN1dS2deVbQwQ"; 
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let dados = [];
        let bancoSel = "";
        let sistemaDesbloqueado = false;

        async function carregar() {
            const { data, error } = await sb.from("conciliacao_bancaria").select("*");
            if (error) { console.error("Erro:", error.message); return; }
            dados = data || [];
            render();
        }

        function render() {
            const busca = document.getElementById("busca").value.toLowerCase();
            let lista = dados.filter(i => (i.empresa_nome?.toLowerCase().includes(busca) || i.cnpj?.includes(busca)) && (bancoSel === "" || i.banco_nome === bancoSel));
            
            document.getElementById("total").innerText = dados.length;
            document.getElementById("total-f").innerText = lista.length;
            document.getElementById("kpi-label").innerText = bancoSel ? bancoSel.toUpperCase() : "TODOS";

            const btnUnlock = document.getElementById("btnUnlock");
            btnUnlock.innerText = sistemaDesbloqueado ? "🔒 BLOQUEAR" : "🔓 DESBLOQUEAR";

            document.getElementById("tabelaCorpo").innerHTML = lista.map(i => `
                <tr>
                    <td>${i.empresa_nome || ""}</td>
                    <td>${i.conta_numero || ""}</td>
                    <td>${i.cnpj || ""}</td>
                    <td>${i.banco_nome || ""}</td>
                    <td>${i.conta_razao_debito || ""}</td>
                    <td>${i.conta_razao_credito || ""}</td>
                    <td>${i.conta_razao_movimento || ""}</td>
                    <td style="text-align:center">
                        ${sistemaDesbloqueado ? 
                            `<a class="action-link" onclick="prepararEdicao('${i.id}')">Editar</a>
                             <a class="action-link delete-link" onclick="remover('${i.id}')">Excluir</a>` 
                            : `<span class="status-locked">Restrito</span>`}
                    </td>
                </tr>`).join("");
            atualizarNav();
        }

        /* FUNÇÕES DO MODAL DE SEGURANÇA */
        function abrirModalSeguranca() {
            if (sistemaDesbloqueado) {
                sistemaDesbloqueado = false;
                render();
            } else {
                document.getElementById("modal-seguranca").style.display = "flex";
                document.getElementById("input-senha-segura").value = "";
                document.getElementById("input-senha-segura").focus();
            }
        }

        function fecharModalSeguranca() {
            document.getElementById("modal-seguranca").style.display = "none";
        }

        function validarSenhaSegura() {
            const senha = document.getElementById("input-senha-segura").value;
            if (senha === "Dexco2026") {
                sistemaDesbloqueado = true;
                fecharModalSeguranca();
                render();
            } else {
                alert("Senha incorreta!");
                document.getElementById("input-senha-segura").value = "";
                document.getElementById("input-senha-segura").focus();
            }
        }

        function atualizarNav() {
            const bancos = [...new Set(dados.map(i => i.banco_nome).filter(Boolean))].sort();
            document.getElementById("nav-bancos").innerHTML = `<div class="banco-link ${bancoSel===''?'ativo':''}" onclick="setBanco('')">TODOS</div>` + 
                bancos.map(b => `<div class="banco-link ${b===bancoSel?'ativo':''}" onclick="setBanco('${b}')">${b.toUpperCase()}</div>`).join("");
        }

        function setBanco(b) { bancoSel = b; render(); }

        function abrirModal() {
            document.getElementById("m-id").value = "";
            document.getElementById("m-empresa").value = "";
            document.getElementById("m-conta").value = "";
            document.getElementById("m-cnpj").value = "";
            document.getElementById("m-banco").value = bancoSel;
            document.getElementById("m-raz-deb").value = "";
            document.getElementById("m-raz-cre").value = "";
            document.getElementById("m-raz-mov").value = "";
            document.getElementById("modal-titulo").innerText = "Nova Configuração";
            document.getElementById("modal").style.display = "flex";
        }

        function fecharModal() { document.getElementById("modal").style.display = "none"; }

        async function salvar() {
            const id = document.getElementById("m-id").value;
            const payload = {
                empresa_nome: document.getElementById("m-empresa").value,
                conta_numero: document.getElementById("m-conta").value,
                cnpj: document.getElementById("m-cnpj").value,
                banco_nome: document.getElementById("m-banco").value,
                conta_razao_debito: document.getElementById("m-raz-deb").value,
                conta_razao_credito: document.getElementById("m-raz-cre").value,
                conta_razao_movimento: document.getElementById("m-raz-mov").value
            };
            const res = id ? await sb.from("conciliacao_bancaria").update(payload).eq("id", id) : await sb.from("conciliacao_bancaria").insert([payload]);
            if (res.error) alert(res.error.message); else { fecharModal(); carregar(); }
        }

        function prepararEdicao(id) {
            const item = dados.find(d => d.id === id);
            document.getElementById("m-id").value = item.id;
            document.getElementById("m-empresa").value = item.empresa_nome;
            document.getElementById("m-conta").value = item.conta_numero;
            document.getElementById("m-cnpj").value = item.cnpj;
            document.getElementById("m-banco").value = item.banco_nome;
            document.getElementById("m-raz-deb").value = item.conta_razao_debito;
            document.getElementById("m-raz-cre").value = item.conta_razao_credito;
            document.getElementById("m-raz-mov").value = item.conta_razao_movimento;
            document.getElementById("modal-titulo").innerText = "Editar Configuração";
            document.getElementById("modal").style.display = "flex";
        }

        async function remover(id) {
            if (!confirm("Excluir configuração?")) return;
            await sb.from("conciliacao_bancaria").delete().eq("id", id);
            carregar();
        }

        function exportarCSV() {
            let csv = "\uFEFFEmpresa;Contas;CNPJ;Banco;Razao Debito;Razao Credito;Razao Movimento\n";
            dados.forEach(i => {
                csv += `${i.empresa_nome||""};${i.conta_numero||""};${i.cnpj||""};${i.banco_nome||""};${i.conta_razao_debito||""};${i.conta_razao_credito||""};${i.conta_razao_movimento||""}\n`;
            });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = "conciliacao_dexco.csv";
            link.click();
        }

        carregar();
    </script>
</body>
</html>
