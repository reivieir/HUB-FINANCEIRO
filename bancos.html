<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dexco S.A - Gestão de Bancos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ==========================================
           CORES E DESIGN DO NOVO HUB
        ========================================== */
        :root { 
            --primary: #0f172a;       /* Azul marinho moderno */
            --danger: #ef4444;        /* Vermelho suave */
            --link: #3b82f6;          /* Azul de link */
            --bg: #f8fafc;            /* Fundo limpo */
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --text: #334155;
            --accent: #10b981;        /* Verde sucesso */
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* TELA DE LOGIN INTERNA (Caso precise manter segurança dupla) */
        #login-screen {
            position: fixed; inset: 0; background: var(--primary);
            display: flex; justify-content: center; align-items: center; z-index: 999;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 12px;
            width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .login-card h2 { color: var(--primary); margin-bottom: 5px; font-weight: 700; }
        .login-card p { color: #64748b; margin-bottom: 20px; font-size: 14px; }
        .login-card input { width: 100%; padding: 12px 15px; margin: 10px 0; border: 1px solid var(--border); border-radius: 6px; outline: none; transition: 0.2s; }
        .login-card input:focus { border-color: var(--link); }
        .login-card button { width: 100%; padding: 12px; background: var(--link); color: white; border: none; cursor: pointer; font-weight: 600; border-radius: 6px; transition: 0.2s; }
        .login-card button:hover { background: #2563eb; }

        /* APP PRINCIPAL */
        #app { display: none; padding: 20px; }
        
        /* CABEÇALHO DO MÓDULO (Sem aquele fundo azul antigo) */
        header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
        }
        header h1 { font-size: 1.5rem; color: var(--primary); font-weight: 700; }
        
        .header-actions button {
            padding: 8px 16px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.9rem;
        }
        .btn-export { background: #f1f5f9; color: var(--text); border: 1px solid var(--border) !important; }
        .btn-export:hover { background: #e2e8f0; }
        .btn-lock { background: var(--danger); color: white; margin-left: 10px; }
        .btn-lock:hover { background: #dc2626; }

        /* NAVEGAÇÃO DE BANCOS (Estilo abas modernas) */
        .nav-bancos {
            display: flex; gap: 10px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 5px;
        }
        .banco-link { 
            padding: 8px 16px; cursor: pointer; color: #64748b; font-weight: 600; border-radius: 6px; 
            transition: 0.2s; background: white; border: 1px solid var(--border); font-size: 0.9rem; white-space: nowrap;
        }
        .banco-link:hover { border-color: #cbd5e1; color: var(--text); }
        .banco-link.ativo { background: var(--primary); color: white; border-color: var(--primary); }

        /* KPIS */
        .kpis { display: flex; gap: 20px; margin-bottom: 20px; }
        .kpi-card { 
            background: white; padding: 20px; border-radius: 8px; flex: 1; 
            border: 1px solid var(--border); box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            font-size: 0.85rem; color: #64748b; font-weight: 600; text-transform: uppercase;
        }
        .kpi { font-size: 32px; color: var(--primary); font-weight: 700; display: block; margin-top: 5px; line-height: 1; }
        
        /* CONTROLES E FILTROS */
        .controls { display: flex; gap: 15px; margin-bottom: 15px; align-items: center; }
        .controls input, .controls select { 
            padding: 10px 15px; border: 1px solid var(--border); border-radius: 6px; outline: none; font-size: 0.95rem;
        }
        .controls input:focus, .controls select:focus { border-color: var(--link); }
        .btn-incluir { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-incluir:hover { background: #059669; }

        /* TABELA MODERNA */
        .table-container { background: white; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; }
        th, td { padding: 15px; border-bottom: 1px solid var(--border); }
        th { background: #f8fafc; font-weight: 600; color: #475569; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.5px; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #f1f5f9; }
        
        .action-link { color: var(--link); text-decoration: none; cursor: pointer; font-weight: 500; margin: 0 5px; font-size: 0.9rem; transition: 0.2s;}
        .action-link:hover { text-decoration: underline; }
        .link-delete { color: var(--danger); }

        /* MODAL */
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6);
            justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(2px);
        }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 380px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .modal-content h3 { margin-bottom: 20px; color: var(--primary); font-size: 1.2rem;}
        .modal-content input { width: 100%; padding: 12px; margin-bottom: 15px; box-sizing: border-box; border: 1px solid var(--border); border-radius: 6px; outline: none;}
        .modal-content input:focus { border-color: var(--link); }
        
        .modal-btns { display:flex; gap:10px; margin-top: 10px; }
        .btn-save { flex:1; padding:12px; background: var(--accent); color: white; border:none; border-radius:6px; cursor:pointer; font-weight:600; }
        .btn-save:hover { background: #059669; }
        .btn-cancel { flex:1; padding:12px; background: #e2e8f0; color: var(--text); border:none; border-radius:6px; cursor:pointer; font-weight:600;}
        .btn-cancel:hover { background: #cbd5e1; }
    </style>
</head>

<body>

    <div id="login-screen">
        <div class="login-card">
            <h2>DEXCO ASSIST</h2>
            <p>Gestão de Acessos Bancários</p>
            <input type="password" id="pass" placeholder="Senha do Sistema" onkeypress="handleEnter(event)">
            <button onclick="entrar()">ENTRAR NO PAINEL</button>
            <p id="login-msg" style="color: #ef4444; font-size: 13px; margin-top: 15px; height: 15px;"></p>
        </div>
    </div>

    <div id="app">
        <header>
            <h1>Gestão de Bancos</h1>
            <div class="header-actions">
                <button class="btn-export" onclick="exportarExcel()">Exportar CSV</button>
                <button class="btn-lock" onclick="sair()">Bloquear Tela</button>
            </div>
        </header>

        <div class="nav-bancos" id="nav-bancos"></div>

        <div class="kpis">
            <div class="kpi-card">Total Geral (Todos os Bancos)<br><span class="kpi" id="total">0</span></div>
            <div class="kpi-card">Acessos em: <span id="kpi-label-filtrado">TODOS</span><br><span class="kpi" id="total-banco" style="color: #3b82f6;">0</span></div>
        </div>

        <div class="controls">
            <input type="text" id="busca" placeholder="Buscar por operador ou empresa..." oninput="render()" style="flex: 1;">
            <select id="filtro-perfil" onchange="filtrarPerfil()"><option value="">Todos perfis</option></select>
            <button class="btn-incluir" onclick="abrirModal()">+ INCLUIR ACESSO</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Operador</th>
                        <th>Perfil</th>
                        <th>Usuário (Login)</th>
                        <th>Banco</th>
                        <th>Empresa</th>
                        <th style="width: 150px; text-align: center;">Ações</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela"></tbody>
            </table>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-titulo">Incluir / Editar Acesso</h3>
            <input type="hidden" id="e-id">
            <input type="text" id="i-nome" placeholder="Nome do Operador">
            <input type="text" id="i-perfil" placeholder="Perfil (Ex: Master, Consulta)">
            <input type="text" id="i-user" placeholder="Login de Usuário">
            <input type="text" id="i-banco" placeholder="Instituição Bancária">
            <input type="text" id="i-empresa" placeholder="Empresa / CNPJ">
            
            <div class="modal-btns">
                <button class="btn-save" onclick="salvar()">SALVAR DADOS</button>
                <button class="btn-cancel" onclick="fechar()">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://spcpujmqnjtalupxzqpp.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwY3B1am1xbmp0YWx1cHh6cXBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MjI3ODMsImV4cCI6MjA4ODI5ODc4M30.TYVtILJNISNR3aDejRM5fsWKt9TuIHgN1dS2deVbQwQ";
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let dados = [];
        let bancoSelecionado = "";
        let perfilSelecionado = "";

        function entrar() {
            const passInput = document.getElementById("pass");
            const senha = passInput.value.trim();
            if (senha === "Dexco2026") {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("app").style.display = "block";
                carregar();
            } else {
                document.getElementById("login-msg").innerText = "Senha incorreta. Tente novamente.";
                passInput.value = "";
                passInput.focus();
            }
        }

        function handleEnter(e) { if(e.key === "Enter") entrar(); }
        function sair() { location.reload(); }

        async function carregar() {
            const { data, error } = await sb.from("gestao_acessos").select("*");
            if (error) { alert("Erro de conexão com o banco de dados: " + error.message); return; }
            dados = data || [];
            render();
        }

        function render() {
            const busca = document.getElementById("busca").value.toLowerCase();
            let lista = dados.filter(i => {
                const operador = i.operador_nome ? i.operador_nome.toLowerCase() : "";
                const empresa = i.empresa ? i.empresa.toLowerCase() : "";
                const matchBusca = operador.includes(busca) || empresa.includes(busca);
                const matchBanco = bancoSelecionado === "" || i.banco_nome === bancoSelecionado;
                const matchPerfil = perfilSelecionado === "" || i.perfil === perfilSelecionado;
                return matchBusca && matchBanco && matchPerfil;
            });

            document.getElementById("total").innerText = dados.length;
            document.getElementById("total-banco").innerText = lista.length;
            document.getElementById("kpi-label-filtrado").innerText = bancoSelecionado ? bancoSelecionado.toUpperCase() : "TODOS";

            document.getElementById("corpo-tabela").innerHTML = lista.map(i => `
                <tr>
                    <td style="font-weight: 500;">${i.operador_nome || "-"}</td>
                    <td><span style="background: #e2e8f0; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 600;">${i.perfil || "-"}</span></td>
                    <td>${i.usuario_login || "-"}</td>
                    <td>${i.banco_nome || "-"}</td>
                    <td>${i.empresa || "-"}</td>
                    <td style="text-align: center;">
                        <a class="action-link" onclick="editar('${i.id}','${i.operador_nome}','${i.perfil}','${i.usuario_login}','${i.banco_nome}','${i.empresa}')">Editar</a>
                        <span style="color:#cbd5e1">|</span>
                        <a class="action-link link-delete" onclick="remover('${i.id}')">Excluir</a>
                    </td>
                </tr>
            `).join("");

            atualizarNavegacao();
        }

        function atualizarNavegacao() {
            const todosBancos = [...new Set(dados.map(i => i.banco_nome).filter(Boolean))].sort();
            const nav = document.getElementById("nav-bancos");
            let html = `<div class="banco-link ${bancoSelecionado === "" ? 'ativo' : ''}" onclick="selecionarBanco('')">Ver Todos</div>`;
            html += todosBancos.map(b => `<div class="banco-link ${b === bancoSelecionado ? 'ativo' : ''}" onclick="selecionarBanco('${b}')">${b.toUpperCase()}</div>`).join("");
            nav.innerHTML = html;

            const dadosParaPerfis = bancoSelecionado ? dados.filter(i => i.banco_nome === bancoSelecionado) : dados;
            const perfis = [...new Set(dadosParaPerfis.map(i => i.perfil).filter(Boolean))].sort();
            document.getElementById("filtro-perfil").innerHTML = `<option value="">Filtrar Perfil (Todos)</option>` +
                perfis.map(p => `<option value="${p}" ${p === perfilSelecionado ? 'selected' : ''}>${p}</option>`).join("");
        }

        function selecionarBanco(b) { bancoSelecionado = b; render(); }
        function filtrarPerfil() { perfilSelecionado = document.getElementById("filtro-perfil").value; render(); }

        function abrirModal() {
            document.getElementById("modal").style.display = "flex";
            document.getElementById("modal-titulo").innerText = "Incluir Novo Acesso";
            document.getElementById("e-id").value = "";
            document.getElementById("i-nome").value = "";
            document.getElementById("i-perfil").value = "";
            document.getElementById("i-user").value = "";
            document.getElementById("i-banco").value = bancoSelecionado;
            document.getElementById("i-empresa").value = "";
        }
        
        function fechar() { document.getElementById("modal").style.display = "none"; }

        async function salvar() {
            const id = document.getElementById("e-id").value;
            const obj = {
                operador_nome: document.getElementById("i-nome").value,
                perfil: document.getElementById("i-perfil").value,
                usuario_login: document.getElementById("i-user").value,
                banco_nome: document.getElementById("i-banco").value,
                empresa: document.getElementById("i-empresa").value
            };
            if (!obj.operador_nome || !obj.banco_nome) { alert("Os campos Operador e Banco são obrigatórios!"); return; }
            
            const res = id ? await sb.from("gestao_acessos").update(obj).eq("id", id) : await sb.from("gestao_acessos").insert([obj]);
            
            if (res.error) alert("Erro ao salvar: " + res.error.message); 
            else { fechar(); carregar(); }
        }

        function editar(id, n, p, u, b, e) {
            abrirModal();
            document.getElementById("modal-titulo").innerText = "Editar Acesso Existente";
            document.getElementById("e-id").value = id;
            document.getElementById("i-nome").value = n;
            document.getElementById("i-perfil").value = p;
            document.getElementById("i-user").value = u;
            document.getElementById("i-banco").value = b;
            document.getElementById("i-empresa").value = e;
        }

        async function remover(id) {
            if (!confirm("Atenção! Confirma a exclusão permanente deste acesso?")) return;
            const { error } = await sb.from("gestao_acessos").delete().eq("id", id);
            if (error) alert("Erro ao excluir: " + error.message); else carregar();
        }

        function exportarExcel() {
            let csv = "\uFEFFOPERADOR;PERFIL;USUARIO;BANCO;EMPRESA\n";
            dados.forEach(i => { csv += `${i.operador_nome||""};${i.perfil||""};${i.usuario_login||""};${i.banco_nome||""};${i.empresa||""}\n`; });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = "Gestao_Acessos_Bancos.csv";
            link.click();
        }
    </script>
</body>
</html>
