<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cash Pooling - Fluxo Diário Dexco</title>
    <style>
        :root { 
            --primary: #002b45; --success: #10b981; --danger: #ef4444;
            --bg: #f8fafc; --border: #e2e8f0; --text: #334155;
            --accent: #f59e0b;
        }
        
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        /* HEADER */
        .header-blue {
            background-color: var(--primary); color: white;
            padding: 5px 20px; display: flex; justify-content: space-between; align-items: center;
            height: 40px; box-sizing: border-box; font-size: 12px;
        }

        /* NAVEGAÇÃO DE DIAS (NOVO) */
        .nav-dias {
            background: #e2e8f0; display: flex; align-items: center;
            padding: 5px 15px; gap: 10px; height: 40px; border-bottom: 1px solid #cbd5e1;
        }
        .dia-btn {
            padding: 5px 12px; border-radius: 4px; background: white; border: 1px solid #cbd5e1;
            font-size: 11px; font-weight: bold; cursor: pointer; color: var(--primary);
        }
        .dia-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-novo-dia { background: var(--success); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: bold; }

        /* ABAS EMPRESAS */
        .nav-empresas {
            display: flex; background: white; border-bottom: 1px solid var(--border);
            overflow-x: auto; padding: 5px 15px 0 15px; height: 35px;
        }
        .tab-btn {
            padding: 6px 15px; cursor: pointer; border: 1px solid transparent;
            border-bottom: none; border-radius: 4px 4px 0 0;
            font-size: 10px; font-weight: bold; color: #64748b; text-transform: uppercase;
        }
        .tab-btn.active { background: var(--bg); border-color: var(--border); color: var(--primary); border-bottom: 2px solid var(--primary); }

        /* GRID E TABELA */
        .grid-container { height: calc(100vh - 115px); overflow: auto; padding: 5px; }
        table { border-collapse: separate; border-spacing: 0; background: white; font-size: 9px; table-layout: fixed; }
        th, td { border: 1px solid var(--border); padding: 3px; min-width: 135px; box-sizing: border-box; }

        .col-categoria {
            position: sticky; left: 0; z-index: 11; background: #f8fafc;
            width: 220px; font-weight: bold; text-align: left; border-right: 2px solid var(--border) !important;
        }

        thead th { background: #f1f5f9; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--border); }

        /* INPUTS */
        .cell-acumulado { display: block; font-weight: bold; font-size: 11px; text-align: right; }
        .input-lancar {
            width: 100%; border: 1px solid #e2e8f0; border-radius: 2px;
            padding: 2px; box-sizing: border-box; text-align: right; font-size: 9px; outline: none;
        }
        .input-lancar:focus { border-color: var(--primary); background: #fffbeb; }

        /* LINHAS ESPECIAIS */
        .row-header { background: #002b45; color: white; }
        .row-subtitle { background: #f1f5f9; font-weight: bold; text-transform: uppercase; }
        .row-total { background: #f8fafc; font-weight: bold; }
        .row-saldo-calc { background: #0284c7; color: white; }
        .row-saldo-segu { background: #1e293b; color: white; }
        
        .indent { padding-left: 15px !important; font-weight: normal; }
        .flash { animation: flash 0.5s; }
        @keyframes flash { from { background: #dcfce7; } to { background: transparent; } }
    </style>
</head>
<body>

    <div class="header-blue">
        <div>Dexco S.A - Cash Pooling (Equalização Financeira)</div>
        <button onclick="window.parent.location.reload()" style="background:var(--danger); color:white; border:none; padding:3px 10px; border-radius:3px; cursor:pointer;">Bloquear</button>
    </div>

    <div class="nav-dias" id="lista-dias">
        <div class="dia-btn" onclick="mudarDia(this)">11/03</div>
        <div class="dia-btn" onclick="mudarDia(this)">12/03</div>
        <div class="dia-btn active" onclick="mudarDia(this)">13/03</div>
        <button class="btn-novo-dia" onclick="abrirNovoDia()">+ ABRIR DIA 14/03</button>
    </div>

    <div class="nav-empresas">
        <div class="tab-btn active">BRDX</div>
        <div class="tab-btn">BRDF</div>
        <div class="tab-btn">FLORESTAL</div>
        <div class="tab-btn">DECORTILES</div>
    </div>

    <div class="grid-container">
        <table id="main-table">
            <thead id="header-contas">
                </thead>
            <tbody id="body-caixa">
                </tbody>
        </table>
    </div>

    <script>
        // Configuração de Contas (Exemplo BRDX conforme fotos)
        const contas = [
            { banco: 'ITAÚ', conta: '0262/17843-7' }, { banco: 'ITAÚ', conta: '0262/29500-9' },
            { banco: 'ITAÚ', conta: '7307/50310-7' }, { banco: 'ITAÚ', conta: '7307/59362-9' },
            { banco: 'BB', conta: '1893-7/343329-3' }, { banco: 'SANTANDER', conta: '2008/130000413' }
        ];

        // Plano de Contas Completo
        const plano = [
            { id: 'si', nome: 'SALDO INICIAL (ONTEM)', tipo: 'total' },
            { nome: 'Entradas', tipo: 'subtitulo', cor: 'text-success' },
            { id: 'c1', nome: 'Clientes - Cobrança', tipo: 'item' },
            { id: 'c2', nome: 'Depósito Clientes', tipo: 'item' },
            { id: 't1', nome: 'TED D (Entrada)', tipo: 'item' },
            { nome: 'Saídas', tipo: 'subtitulo', cor: 'text-danger' },
            { id: 's1', nome: 'Fornecedores SAP', tipo: 'item' },
            { id: 's2', nome: 'Salários', tipo: 'item' },
            { id: 's3', nome: 'Tarifas', tipo: 'item' },
            { id: 'ts1', nome: 'TED D (Transferência)', tipo: 'item' },
            { id: 'sc', nome: 'SALDO CALCULADO', tipo: 'total-azul' },
            { id: 'ms', nome: 'MARGEM SEGURA', tipo: 'item' },
            { id: 'ss', nome: 'SALDO SEGURO', tipo: 'total-preto' }
        ];

        function render() {
            const h = document.getElementById('header-contas');
            const b = document.getElementById('body-caixa');
            
            h.innerHTML = `<tr><th class="col-categoria">CONTAS / DATA</th>${contas.map(c => `<th>${c.banco}<br><span style="font-weight:normal">${c.conta}</span></th>`).join('')}</tr>`;

            b.innerHTML = plano.map(linha => {
                let cls = "";
                if(linha.tipo === 'subtitulo') cls = "row-subtitle " + linha.cor;
                if(linha.tipo === 'total-azul') cls = "row-saldo-calc";
                if(linha.tipo === 'total-preto') cls = "row-saldo-segu";

                return `<tr class="${cls}">
                    <td class="col-categoria">${linha.nome}</td>
                    ${contas.map((c, i) => {
                        if(linha.tipo === 'subtitulo') return `<td></td>`;
                        const input = (linha.tipo === 'item' || linha.id === 'si');
                        return `<td>
                            <span class="cell-acumulado" id="val-${linha.id}-${i}">0,00</span>
                            ${input ? `<input type="text" class="input-lancar" onkeypress="lancar(event, '${linha.id}', ${i})">` : ''}
                        </td>`;
                    }).join('')}
                </tr>`;
            }).join('');
        }

        function lancar(e, lid, cidx) {
            if(e.key === 'Enter') {
                const v = parseFloat(e.target.value.replace(',', '.'));
                if(isNaN(v)) return;
                const sp = document.getElementById(`val-${lid}-${cidx}`);
                let at = parseFloat(sp.innerText.replace(/\./g, '').replace(',', '.'));
                sp.innerText = (at + v).toLocaleString('pt-BR', {minimumFractionDigits: 2});
                e.target.parentElement.classList.add('flash');
                setTimeout(() => e.target.parentElement.classList.remove('flash'), 500);
                e.target.value = "";
            }
        }

        function mudarDia(btn) {
            document.querySelectorAll('.dia-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            // Aqui carregaria os dados do dia selecionado do Supabase
        }

        function abrirNovoDia() {
            alert("Iniciando abertura do dia 14/03...\nImportando saldos finais do dia 13/03.");
            // Lógica para criar novo registro de data no banco
        }

        render();
    </script>
</body>
</html>
