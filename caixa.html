<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dexco S.A - Gestão de Caixa</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ==========================================
           CORES E DESIGN BASE
        ========================================== */
        :root { 
            --primary: #002b45; 
            --danger: #c40000; 
            --link: #0056b3; 
            --bg: #f4f7f6; 
            --border: #e2e8f0;
            --text: #334155;
            --accent: #10b981; 
            --azul-entrada: #5b9bd5;
            --vermelho-saida: #ef4444;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }

        /* ==========================================
           MOLDE PADRÃO DEXCO (FUNDO E MARGENS)
        ========================================== */
        html, body {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background-color: #f0f2f5; 
            overflow: hidden; 
            color: var(--text);
        }

        body {
            padding: 25px; 
            display: flex;
            flex-direction: column;
            zoom: 1.1; /* Ajuste para legibilidade no Hub */
        }

        /* O CARTÃO BRANCO ARREDONDADO */
        .app-wrapper {
            flex: 1; 
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden; 
            min-height: 0;
        }

        /* BARRA AZUL MARINHO NO TOPO */
        header {
            background-color: var(--primary); color: white; padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
        }
        header h1 { font-size: 14px; font-weight: 400; margin: 0; letter-spacing: 0.5px; }
        
        .header-actions { display: flex; gap: 10px; }
        .header-actions button { padding: 6px 15px; border: none; border-radius: 3px; font-weight: 600; cursor: pointer; font-size: 11px; transition: 0.2s; }
        
        .btn-resumo { background: #f59e0b; color: white; }
        .btn-resumo:hover { background: #d97706; }
        .btn-exit { background: var(--danger); color: white; }
        .btn-exit:hover { background: #a30000; }

        /* ÁREA DE CONTEÚDO */
        .app-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0;
            overflow: hidden;
            min-height: 0;
        }

        /* NAVEGAÇÕES INTERNAS */
        .nav-dias { background: #e2e8f0; display: flex; align-items: center; padding: 0 15px; gap: 8px; height: 36px; flex-shrink: 0; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .dia-btn { display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 4px; background: white; border: 1px solid var(--border); font-size: 11px; font-weight: bold; cursor: pointer; color: #64748b; white-space: nowrap; }
        .dia-btn.active { background: var(--primary); color: white; }
        .btn-acao { color: #94a3b8; font-size: 12px; cursor: pointer; line-height: 1; }
        .btn-acao:hover { color: var(--primary); }

        .btn-novo-dia { background: var(--accent); color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: bold; white-space: nowrap; }
        .btn-excluir-dia { background: var(--vermelho-saida); color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: bold; margin-left: auto; }

        .nav-empresas { display: flex; background: white; border-bottom: 1px solid var(--border); overflow-x: auto; padding: 0 15px; height: 34px; flex-shrink: 0; align-items: center; }
        .tab-btn { padding: 5px 15px; cursor: pointer; border: 1px solid transparent; font-size: 10px; font-weight: bold; color: #64748b; text-transform: uppercase; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        /* TABELA COM ROLAGEM HORIZONTAL ATIVA */
        .grid-container { flex: 1; overflow: auto; background: white; position: relative; min-height: 0; }
        
        table { border-collapse: separate; border-spacing: 0; min-width: 100%; width: max-content; font-size: 10px; }
        th, td { border: 1px solid var(--border); padding: 3px 6px; min-width: 140px; box-sizing: border-box; vertical-align: middle; background: white; }

        .col-categoria { position: sticky; left: 0; z-index: 11; background: white; min-width: 250px; text-align: left; border-right: 2px solid var(--border) !important; }
        thead th { background: #f1f5f9; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--border); color: var(--primary); padding: 5px; }
        thead th.col-categoria { z-index: 12; background: #e2e8f0; text-align: center; }

        .cell-wrapper { display: flex; flex-direction: column; align-items: flex-end; }
        .input-lancar { width: 100%; border: 1px solid #e2e8f0; border-radius: 2px; padding: 2px; text-align: right; font-size: 9px; outline: none; background: #f8fafc; }
        .input-lancar:focus { border-color: var(--primary); background: #fffbeb; }

        .bg-total-entradas { background-color: var(--azul-entrada) !important; color: white !important; font-weight: bold; }
        .bg-total-saidas { background-color: var(--vermelho-saida) !important; color: white !important; font-weight: bold; }
        .bg-saldo-calculado { background-color: #0284c7 !important; color: white !important; font-weight: bold; }
        .bg-saldo-seguro { background-color: #1e293b !important; color: white !important; font-weight: bold; }
        .linha-destaque { font-weight: bold; }
        .indent { padding-left: 20px !important; }
        .no-input .input-lancar { display: none; }
        .no-input .cell-acumulado { font-weight: bold; }

        /* MODAIS */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background-color: #f8fafc; padding: 20px; border-radius: 8px; width: 85%; max-width: 800px; max-height: 90vh; overflow-y: auto; }
        .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .resumo-table-print { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; background: white; }
        .resumo-table-print th, .resumo-table-print td { border: 1px solid #cbd5e1; padding: 8px; }
        .resumo-table-print th { background-color: var(--primary); color: white; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <header>
            <h1>Dexco S.A - Gestão Diária de Caixa</h1>
            <div class="header-actions">
                <button class="btn-resumo" onclick="abrirResumo()">📊 RESUMO DO DIA</button>
                <button class="btn-exit" onclick="window.parent.location.reload()">Sair / Bloquear</button>
            </div>
        </header>

        <div class="app-content">
            <div class="nav-dias" id="nav-dias-container"></div>
            <div class="nav-empresas" id="nav-empresas-container"></div>

            <div class="grid-container">
                <table>
                    <thead id="h-contas"></thead>
                    <tbody id="b-caixa"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal-resumo" class="modal">
        <div class="modal-content">
            <span class="close" onclick="document.getElementById('modal-resumo').style.display='none'">&times;</span>
            <div style="margin-bottom: 15px;">
                <button onclick="copiarResumoImagem()" style="background: #10b981; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer;">📋 Copiar Imagem</button>
                <button onclick="confirmarEnvioLote()" style="background: #3b82f6; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin-left:10px;">✅ Marcar como Enviado</button>
            </div>
            <div id="resumo-export-area" style="background: white; padding: 15px; border: 1px solid #ddd;">
                <h2 style="color:var(--primary);">Novas Aplicações/Resgates: <span id="resumo-dia-titulo"></span></h2>
                <div id="resumo-content-pendente"></div>
            </div>
            <div id="resumo-content-consolidado" style="margin-top:20px;"></div>
        </div>
    </div>

    <script>
        const empresasConfig = {
            'BRDX': [{ b: 'ITAÚ', c: '0262 / 17843-7' }, { b: 'ITAÚ', c: '0262 / 29500-9' }, { b: 'ITAÚ', c: '0262 / 11079-4' }, { b: 'ITAÚ', c: '7307 / 50310-7' }, { b: 'ITAÚ', c: 'ITAÚ 59362-9', c:'7307 / 59362-9' }, { b: 'BB', c: '1893-7/ 343329-3' }, { b: 'SANTANDER', c: '2008/ 130000413' }, { b: 'BRADESCO', c: '2372-8/ 89300-5' }, { b: 'BRADESCO', c: '0895-8 / 76322-5' }, { b: 'SAFRA', c: '115/ 000.330-5' }, { b: 'BANRISUL', c: '0413 / 60157510-3' }, { b: 'CAIXA', c: '3337 / 577246689-1' }, { b: 'BNB', c: '0031 / 55843-6' }, { b: 'ABC BRASIL', c: '0001-9 / 2.331.908-0' }, { b: 'DAYCOVAL', c: '0001 / 001516474-0' }],
            'BRDF': [{ b: 'ITAÚ', c: '0262 / 17847-8' }, { b: 'ITAÚ', c: '7307 /50311-5' }, { b: 'ITAÚ', c: '7307 /50312-3' }, { b: 'ITAÚ', c: '0350/ 59363-7' }, { b: 'BB', c: '1893-7 /30001-2' }, { b: 'SANTANDER', c: '2271 / 13003017-5' }, { b: 'BRADESCO', c: '2374-4  / 35500-3' }, { b: 'SAFRA', c: '115/ 005949-1' }, { b: 'CEF', c: '1679/ 2783-9' }, { b: 'CEF', c: '3337 / 577246793-6' }, { b: 'ABC BRASIL', c: '0001-9 / 2.331.859-9' }, { b: 'DAYCOVAL', c: '0001/ 001516477-4' }],
            'BRHY': [{ b: 'ITAÚ', c: '0046 /15601-4' }, { b: 'BB', c: '1893-7 / 32966-5' }, { b: 'SANTANDER', c: '0728 / 13000535-6' }, { b: 'BRADESCO', c: '2372 / 0038760-6' }],
            'BRCF': [{ b: 'ITAÚ', c: '7307 / 11112-5' }, { b: 'BB', c: '1893-7/ 106406-1' }, { b: 'SANTANDER', c: '2271 / 13020743-0' }, { b: 'SAFRA', c: '1150/44941-9' }, { b: 'BNB', c: '31 / 43636-5' }, { b: 'BNB', c: '31 / 43626-8' }],
            'SPE + Controladas': [{ b: 'BRS1', c: '7307 / 50645-6' }, { b: 'BRS3 - ITA', c: '7307 / 60438-4' }, { b: 'BRS2 - ITA', c: '7307 / 59899-0' }, { b: 'BRS2 - SAF', c: '0115 / 00056629-6' }, { b: 'BREM - ITA', c: '0262 / 17856-9' }, { b: 'BRBC - ITA', c: '0262 / 91486-4' }, { b: 'BRSF - ITA', c: '0262 / 04518-0' }, { b: 'BRIT - ITA', c: '7307/ 59901-4' }, { b: 'DFL II - ITA', c: '7307 / 96675-9' }, { b: 'BRSD - ITA', c: '7307 /48718-6' }, { b: 'BRTR - ITA', c: '7307/ 08704-4' }]
        };

        const plano = [
            { id: 'si', nome: 'SALDO INICIAL :', tipo: 'linha-destaque', readOnly: false },
            { id: 'te', nome: 'TOTAL ENTRADAS', tipo: 'bg-total-entradas', readOnly: true },
            { id: 'sc', nome: 'SOMA CLIENTES', tipo: 'grupo-soma', readOnly: true },
            { id: 'c1', nome: 'Cobrança', tipo: 'item' }, { id: 'c2', nome: 'Deposito Clientes', tipo: 'item' }, { id: 'c3', nome: 'Rede Card/Cielo', tipo: 'item' },
            { id: 'o3', nome: 'Resgate', tipo: 'linha-banco' }, 
            { id: 'tr', nome: 'SOMA TED RECEBIDA', tipo: 'linha-destaque', readOnly: true },
            { id: 'tsai', nome: 'TOTAL SAÍDAS', tipo: 'bg-total-saidas', readOnly: true },
            { id: 's1', nome: 'SAP', tipo: 'item' }, { id: 'so7', nome: 'Aplicação', tipo: 'linha-banco' }, 
            { id: 'stenv', nome: 'SOMA TED D ENVIADA', tipo: 'linha-transferencia' },
            { id: 'calc', nome: 'SALDO CALCULADO', tipo: 'bg-saldo-calculado', readOnly: true },
            { id: 'seg', nome: 'SALDO SEGURO', tipo: 'bg-saldo-seguro', readOnly: true }
        ];

        let empresaAtiva = 'BRDX';
        let contas = empresasConfig[empresaAtiva];
        let diaAtivo = 'Hoje';
        let dadosPorDia = { 'Hoje': {} };
        Object.keys(empresasConfig).forEach(e => dadosPorDia['Hoje'][e] = {});

        function renderTabsEmpresas() {
            let html = '';
            Object.keys(empresasConfig).forEach(emp => {
                html += `<div class="tab-btn ${emp === empresaAtiva ? 'active' : ''}" onclick="mudarEmpresa('${emp}')">${emp}</div>`;
            });
            document.getElementById('nav-empresas-container').innerHTML = html;
        }

        function mudarEmpresa(nova) { salvarEstado(); empresaAtiva = nova; contas = empresasConfig[empresaAtiva]; renderTabsEmpresas(); renderTabela(); carregarEstado(); }

        function renderTabela() {
            const h = document.getElementById('h-contas');
            const b = document.getElementById('b-caixa');
            h.innerHTML = `<tr><th class="col-categoria">Categorias / Contas</th>${contas.map(c => `<th>${c.b}<br><small>${c.c}</small></th>`).join('')}</tr>`;
            b.innerHTML = plano.map(l => {
                const noInput = l.readOnly ? 'no-input' : '';
                return `<tr><td class="col-categoria ${l.tipo}">${l.nome}</td>
                ${contas.map((c, i) => `<td><div class="cell-wrapper ${noInput}">
                    <span id="val-${l.id}-${i}" class="cell-acumulado" data-pendente="0">0,00</span>
                    ${l.tipo === 'linha-banco' ? `<select id="banco-${l.id}-${i}" class="input-lancar"><option value="">Banco...</option><option value="ITAÚ">ITAÚ</option><option value="BB">BB</option><option value="SAFRA">SAFRA</option></select>` : ''}
                    <input type="text" class="input-lancar" onkeypress="lancar(event, '${l.id}', ${i})">
                </div></td>`).join('')}</tr>`;
            }).join('');
        }

        function getV(id, idx) { let el = document.getElementById(`val-${id}-${idx}`); return el ? parseFloat(el.innerText.replace(/\./g, '').replace(',', '.')) || 0 : 0; }
        function setV(id, idx, v) { let el = document.getElementById(`val-${id}-${idx}`); if(el) el.innerText = v.toLocaleString('pt-BR', {minimumFractionDigits: 2}); }

        function recalcularColuna(idx) {
            let te = getV('c1', idx) + getV('c2', idx) + getV('c3', idx) + getV('o3', idx) + getV('tr', idx); setV('te', idx, te);
            let tsai = getV('s1', idx) + getV('so7', idx) + getV('stenv', idx); setV('tsai', idx, tsai);
            let calc = getV('si', idx) + te - tsai; setV('calc', idx, calc);
            setV('seg', idx, calc);
        }

        function lancar(e, lid, idx) {
            if(e.key === 'Enter') {
                const v = parseFloat(e.target.value.replace(',', '.'));
                if(isNaN(v)) return;
                if(lid === 'si') setV(lid, idx, v); else setV(lid, idx, getV(lid, idx) + v);
                if(lid === 'o3' || lid === 'so7') {
                    let el = document.getElementById(`val-${lid}-${idx}`);
                    el.setAttribute('data-pendente', (parseFloat(el.getAttribute('data-pendente')) || 0) + v);
                }
                e.target.value = ""; recalcularColuna(idx); salvarEstado();
            }
        }

        function salvarEstado() {
            let est = dadosPorDia[diaAtivo][empresaAtiva];
            contas.forEach((c, i) => {
                est[i] = est[i] || {};
                plano.forEach(l => {
                    let el = document.getElementById(`val-${l.id}-${i}`);
                    if(el) {
                        est[i][l.id] = el.innerText;
                        if(l.id === 'o3' || l.id === 'so7') est[i][`p-${l.id}`] = el.getAttribute('data-pendente');
                    }
                });
            });
        }

        function carregarEstado() {
            let est = dadosPorDia[diaAtivo][empresaAtiva];
            contas.forEach((c, i) => {
                plano.forEach(l => {
                    let el = document.getElementById(`val-${l.id}-${i}`);
                    if(el && est[i]) {
                        el.innerText = est[i][l.id] || "0,00";
                        if(l.id === 'o3' || l.id === 'so7') el.setAttribute('data-pendente', est[i][`p-${l.id}`] || "0");
                    }
                });
                recalcularColuna(i);
            });
        }

        function renderTabsDias() {
            document.getElementById('nav-dias-container').innerHTML = `<div class="dia-btn active">${diaAtivo}</div><button class="btn-novo-dia" onclick="alert('Funcionalidade de múltiplos dias em desenvolvimento')">+ NOVO DIA</button><button class="btn-excluir-dia">🗑️</button>`;
        }

        function abrirResumo() {
            document.getElementById('resumo-dia-titulo').innerText = diaAtivo;
            let html = '<table class="resumo-table-print"><thead><tr><th>Empresa</th><th>Resgate</th><th>Aplicação</th></tr></thead><tbody>';
            Object.keys(empresasConfig).forEach(emp => {
                let r = 0, a = 0;
                (dadosPorDia[diaAtivo][emp] || {} && Object.values(dadosPorDia[diaAtivo][emp])).forEach(d => {
                    r += parseFloat(d['p-o3']) || 0; a += parseFloat(d['p-so7']) || 0;
                });
                if(r>0 || a>0) html += `<tr><td>${emp}</td><td>${r.toLocaleString('pt-BR')}</td><td>${a.toLocaleString('pt-BR')}</td></tr>`;
            });
            document.getElementById('resumo-content-pendente').innerHTML = html + '</tbody></table>';
            document.getElementById('modal-resumo').style.display = 'flex';
        }

        renderTabsEmpresas(); renderTabela(); renderTabsDias();
    </script>
</body>
</html>
