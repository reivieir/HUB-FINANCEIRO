<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cash Pooling - Dexco</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary: #002b45; --success: #10b981; --danger: #ef4444;
            --bg: #f8fafc; --border: #e2e8f0; --text: #334155;
            --accent: #f59e0b;
        }
        
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        /* HEADER */
        .header-blue {
            background-color: var(--primary); color: white;
            padding: 5px 20px; display: flex; justify-content: space-between; align-items: center;
            height: 40px; box-sizing: border-box; font-size: 12px;
        }

        /* NAVEGAÇÃO DE DIAS */
        .nav-dias {
            background: #e2e8f0; display: flex; align-items: center;
            padding: 5px 15px; gap: 8px; height: 38px; border-bottom: 1px solid #cbd5e1;
        }
        .dia-btn {
            padding: 4px 10px; border-radius: 4px; background: white; border: 1px solid #cbd5e1;
            font-size: 10px; font-weight: bold; cursor: pointer; color: var(--primary);
        }
        .dia-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-novo-dia { background: var(--success); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: bold; }

        /* ABAS EMPRESAS */
        .nav-empresas {
            display: flex; background: white; border-bottom: 1px solid var(--border);
            overflow-x: auto; padding: 5px 15px 0 15px; height: 35px;
        }
        .tab-btn {
            padding: 6px 15px; cursor: pointer; border: 1px solid transparent;
            border-bottom: none; border-radius: 4px 4px 0 0;
            font-size: 10px; font-weight: bold; color: #64748b; text-transform: uppercase;
        }
        .tab-btn.active { background: var(--bg); border-color: var(--border); color: var(--primary); border-bottom: 2px solid var(--primary); }

        /* GRID */
        .grid-container { height: calc(100vh - 113px); overflow: auto; padding: 5px; }
        table { border-collapse: separate; border-spacing: 0; background: white; font-size: 9px; table-layout: fixed; }
        th, td { border: 1px solid var(--border); padding: 3px; min-width: 135px; box-sizing: border-box; }

        .col-categoria {
            position: sticky; left: 0; z-index: 11; background: #f8fafc;
            width: 240px; font-weight: bold; text-align: left; border-right: 2px solid var(--border) !important;
        }

        thead th { background: #f1f5f9; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--border); }

        /* INPUTS E VALORES */
        .cell-acumulado { display: block; font-weight: bold; font-size: 11px; text-align: right; }
        .input-lancar {
            width: 100%; border: 1px solid #e2e8f0; border-radius: 2px;
            padding: 2px; box-sizing: border-box; text-align: right; font-size: 9px; outline: none;
        }
        .input-lancar:focus { border-color: var(--primary); background: #fffbeb; }

        /* ESTILIZAÇÃO DE LINHAS - FIEL AO PRINT */
        .row-header { background: #002b45; color: white; }
        .row-subtitle { background: #e2e8f0; font-weight: bold; text-transform: uppercase; }
        .row-total { background: #f1f5f9; font-weight: bold; }
        .row-total td { color: var(--primary); }
        
        .row-saldo-calc { background: #0284c7; color: white; }
        .row-saldo-segu { background: #1e293b; color: white; }
        
        .indent { padding-left: 20px !important; font-weight: normal; }
        .indent-total { padding-left: 20px !important; font-weight: bold; }
        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }
        .flash { animation: flash 0.5s; }
        @keyframes flash { from { background: #dcfce7; } to { background: transparent; } }
    </style>
</head>
<body>

    <div class="header-blue">
        <div>Dexco S.A - Cash Pooling (Equalização Financeira)</div>
        <button onclick="window.parent.location.reload()" style="background:var(--danger); color:white; border:none; padding:3px 10px; border-radius:3px; cursor:pointer;">Bloquear</button>
    </div>

    <div class="nav-dias">
        <div class="dia-btn">11/03</div>
        <div class="dia-btn">12/03</div>
        <div class="dia-btn active">13/03</div>
        <button class="btn-novo-dia">+ ABRIR 14/03</button>
    </div>

    <div class="nav-empresas">
        <div class="tab-btn active">BRDX</div>
        <div class="tab-btn">BRDF</div>
        <div class="tab-btn">FLORESTAL</div>
        <div class="tab-btn">DECORTILES</div>
    </div>

    <div class="grid-container">
        <table>
            <thead id="h-contas"></thead>
            <tbody id="b-caixa"></tbody>
        </table>
    </div>

    <script>
        // Configuração de Contas (Simulação BRDX baseada nos prints)
        const contasBRDX = [
            { banco: 'ITAÚ', conta: '0262/17843-7' }, { banco: 'ITAÚ', conta: '0262/29500-9' },
            { banco: 'ITAÚ', conta: '0262/11079-4' }, { banco: 'ITAÚ', conta: '7307/50310-7' },
            { banco: 'BB', conta: '1893-7/343329-3' }, { banco: 'SAN', conta: '2008/130000413' }
        ];

        // --- PLANO DE CONTAS FIEL À IMAGEM image_03b80a.png ---
        const planoContas = [
            { id: 'si', nome: 'SALDO INICIAL (ONTEM) :', tipo: 'total-principal' },
            { id: 'te', nome: 'TOTAL ENTRADAS', tipo: 'sub', cor: 'text-success' },
            
            { nome: 'Clientes', tipo: 'grupo' },
            { id: 'c1', nome: 'Cobrança', tipo: 'item' },
            { id: 'c2', nome: 'Deposito Clientes', tipo: 'item' },
            { id: 'c3', nome: 'Rede Card/Cielo', tipo: 'item' },
            { id: 'c4', nome: 'Entradas outras', tipo: 'item' },
            { id: 'c5', nome: 'Exportação', tipo: 'item' },
            
            { nome: 'Colaboradores', tipo: 'grupo' },
            { id: 'co1', nome: 'Concur', tipo: 'item' },
            { id: 'co2', nome: 'Salários', tipo: 'item' },
            
            { nome: 'Outros', tipo: 'grupo' },
            { id: 'o1', nome: 'Deposito Outros', tipo: 'item' },
            { id: 'o2', nome: 'Desbloqueio Judicial', tipo: 'item' },
            { id: 'o3', nome: 'Resgate', tipo: 'item' },
            { id: 'o4', nome: 'Pagamento Fundação', tipo: 'item' },
            { id: 'o5', nome: 'Rateio de Condominio - CRCC', tipo: 'item' },
            { id: 'o6', nome: 'Venda de Ativos - Facilities', tipo: 'item' },
            { id: 'o7', nome: 'CCEE - ENERGIA', tipo: 'item' },
            { id: 'o8', nome: 'NDF', tipo: 'item' },
            
            { nome: 'Financiamento', tipo: 'grupo' },
            { id: 'f1', nome: 'Financiamento', tipo: 'item' },
            { id: 'f2', nome: 'SWAP', tipo: 'item' },
            
            { nome: 'Intercias', tipo: 'grupo' },
            { id: 'i1', nome: 'Intercias', tipo: 'item' },
            { id: 'i2', nome: 'Faturamento', tipo: 'item' },
            { id: 'i3', nome: "Faturamento SCP's", tipo: 'item' },
            
            { id: 'm1', nome: 'MUTUO', tipo: 'total' },
            { id: 'a1', nome: 'APORTE / AFAC / CAP. INT.', tipo: 'total' },
            
            { nome: 'TED D (Entrada)', tipo: 'grupo' },
            { id: 't1', nome: 'TED D', tipo: 'item' },

            // --- SAÍDAS ---
            { id: 'ts', nome: 'TOTAL SAÍDAS', tipo: 'sub', cor: 'text-danger' },
            
            { nome: 'Fornecedores', tipo: 'grupo' },
            { id: 's1', nome: 'SAP', tipo: 'item' },
            { id: 's2', nome: 'Complemento', tipo: 'item' },
            { id: 's3', nome: 'Siscomex', tipo: 'item' },
            { id: 's4', nome: 'Concessionaria', tipo: 'item' },
            { id: 's5', nome: 'CCEE - ENERGIA', tipo: 'item' },
            { id: 's6', nome: 'Câmbio', tipo: 'item' },
            { id: 's7', nome: 'Marinha Mercante', tipo: 'item' },
            
            { nome: 'Salários', tipo: 'grupo' },
            { id: 'sa1', nome: 'Salários', tipo: 'item' },
            { id: 'sa2', nome: 'Débito de Consignado', tipo: 'item' },
            
            { nome: 'Outros', tipo: 'grupo' },
            { id: 'ou1', nome: 'Cartão de Crédito', tipo: 'item' },
            { id: 'ou2', nome: 'Tarifas', tipo: 'item' },
            { id: 'ou3', nome: 'Comissão / Fiança', tipo: 'item' },
            { id: 'ou4', nome: 'Bloqueio judicial', tipo: 'item' },
            { id: 'ou5', nome: 'Sem Parar', tipo: 'item' },
            { id: 'ou6', nome: 'CRCC', tipo: 'item' },
            { id: 'ou7', nome: 'Aplicação', tipo: 'item' },
            { id: 'ou8', nome: 'NDF', tipo: 'item' },

            { nome: 'Financiamento', tipo: 'grupo' },
            { id: 'fi1', nome: 'Financiamentos Principal', tipo: 'item' },
            { id: 'fi2', nome: 'Financiamentos Juros', tipo: 'item' },
            { id: 'fi3', nome: 'SWAP Principal', tipo: 'item' },
            { id: 'fi4', nome: 'SWAP Juros', tipo: 'item' },
            { id: 'fi5', nome: 'Dividendos', tipo: 'item' },

            { nome: 'Intercias', tipo: 'grupo' },
            { id: 'in1', nome: 'Intercias', tipo: 'item' },
            { id: 'in2', nome: 'Faturamento DF', tipo: 'item' },
            { id: 'in3', nome: "Faturamento SCP's", tipo: 'item' },

            { id: 'mu1', nome: 'MUTUO', tipo: 'total' },
            { nome: 'APORTE / AFAC / CAP. INT.', tipo: 'grupo' },
            { id: 'ap1', nome: 'VIVA DECORA', tipo: 'item' },
            { id: 'ap2', nome: 'CRI SUMA', tipo: 'item' },

            // --- SEÇÃO TED D (Saída) DETALHADA ---
            { nome: 'TED D (Saída / Transferência)', tipo: 'grupo' },
            { id: 'ts1', nome: '0262 / 29500-9', tipo: 'item' },
            { id: 'ts2', nome: '0262 / 11079-4', tipo: 'item' },
            { id: 'ts3', nome: '7307 / 50310-7', tipo: 'item' },
            { id: 'ts4', nome: '1893-7/ 343329-3', tipo: 'item' },
            { id: 'ts5', nome: '2008/ 130000413', tipo: 'item' },
            { id: 'ts6', nome: '2372-8/ 89300-5', tipo: 'item' },
            { id: 'ts7', nome: '0895-8 / 76322-5', tipo: 'item' },
            { id: 'ts8', nome: '115/ 000.330-5', tipo: 'item' },
            { id: 'ts9', nome: '0413 / 60157510-3', tipo: 'item' },
            { id: 'ts10', nome: '3337 / 577246689-1', tipo: 'item' },
            { id: 'ts11', nome: '0031 / 55843-6', tipo: 'item' },
            { id: 'ts12', nome: '7307 / 59362-9', tipo: 'item' },
            { id: 'ts13', nome: '0001-9 / 2.331.908-0', tipo: 'item' },
            { id: 'ts14', nome: '0001 / 001516474-0', tipo: 'item' },

            // --- TOTAIS FINAIS ---
            { id: 'sc', nome: 'SALDO CALCULADO', tipo: 'total-azul' },
            { id: 'ms', nome: 'MARGEM SEGURA', tipo: 'item' },
            { id: 'ss', nome: 'SALDO SEGURO', tipo: 'total-preto' }
        ];

        function render() {
            const h = document.getElementById('h-contas');
            const b = document.getElementById('b-caixa');
            h.innerHTML = `<tr><th class="col-categoria">CATEGORIA / DATA</th>${contasBRDX.map(c => `<th>${c.banco}</th>`).join('')}</tr>
                               <tr><th class="col-categoria">CONTAS</th>${contasBRDX.map(c => `<th style="font-weight:normal">${c.conta}</th>`).join('')}</tr>`;

            b.innerHTML = planoContas.map(linha => {
                let trClass = "";
                if(linha.tipo === 'sub') trClass = "row-subtitle " + linha.cor;
                if(linha.tipo === 'grupo' || linha.tipo === 'total') trClass = "row-total";
                if(linha.tipo === 'total-principal') trClass = "row-total";
                if(linha.tipo === 'total-azul') trClass = "row-saldo-calc";
                if(linha.tipo === 'total-preto') trClass = "row-saldo-segu";

                return `<tr class="${trClass}">
                    <td class="col-categoria ${linha.tipo === 'item' ? 'indent' : ''}">${linha.nome}</td>
                    ${contasBRDX.map((c, i) => {
                        if(linha.tipo === 'sub') return `<td></td>`;
                        // Apenas categorias com input de digitação
                        const showInput = (linha.tipo === 'item' || linha.id === 'si' || linha.tipo === 'total');
                        return `<td>
                            <span class="cell-acumulado" id="val-${linha.id}-${i}">0,00</span>
                            ${showInput ? `<input type="text" class="input-lancar" placeholder="+" onkeypress="lancar(event, '${linha.id}', ${i})">` : ''}
                        </td>`;
                    }).join('')}
                </tr>`;
            }).join('');
        }

        function lancar(e, lid, cidx) {
            if(e.key === 'Enter') {
                const val = parseFloat(e.target.value.replace(',', '.'));
                if(isNaN(val)) return;
                const span = document.getElementById(`val-${lid}-${cidx}`);
                let atual = parseFloat(span.innerText.replace(/\./g, '').replace(',', '.'));
                span.innerText = (atual + val).toLocaleString('pt-BR', {minimumFractionDigits: 2});
                e.target.parentElement.classList.add('flash');
                setTimeout(() => e.target.parentElement.classList.remove('flash'), 500);
                e.target.value = "";
            }
        }
        render();
    </script>
</body>
</html>
