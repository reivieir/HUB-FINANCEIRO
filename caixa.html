<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cash Pooling - Dexco</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary: #002b45; 
            --success: #10b981; 
            --danger: #ef4444;
            --bg: #f8fafc;
            --border: #e2e8f0;
            --text-main: #334155;
        }
        
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text-main); overflow: hidden; }

        /* HEADER */
        .header-blue {
            background-color: var(--primary); color: white;
            padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;
            height: 45px; box-sizing: border-box; font-size: 13px;
        }

        .header-btns { display: flex; gap: 10px; }
        .btn-export { background: white; color: black; border: 1px solid #ccc; padding: 4px 10px; cursor: pointer; font-size: 11px; border-radius: 2px; }
        .btn-logout { background: var(--danger); color: white; border: none; padding: 4px 12px; cursor: pointer; font-size: 11px; border-radius: 4px; font-weight: bold; }

        /* ABAS (EMPRESAS) */
        .nav-empresas {
            display: flex; background: white; border-bottom: 1px solid var(--border);
            overflow-x: auto; white-space: nowrap; padding: 5px 15px 0 15px; height: 40px;
        }
        .tab-btn {
            padding: 8px 18px; cursor: pointer; border: 1px solid transparent;
            border-bottom: none; border-radius: 5px 5px 0 0;
            font-size: 11px; font-weight: bold; color: #64748b; text-transform: uppercase;
        }
        .tab-btn.active {
            background: var(--bg); border-color: var(--border);
            color: var(--primary); border-bottom: 2px solid var(--primary);
        }

        /* GRUPO DE COLUNAS (GRID) */
        .grid-container { height: calc(100vh - 85px); overflow: auto; padding: 10px; }

        table { border-collapse: separate; border-spacing: 0; background: white; font-size: 10px; table-layout: fixed; min-width: 100%; }
        th, td { border: 1px solid var(--border); padding: 4px; min-width: 140px; box-sizing: border-box; }

        /* Coluna Categorias Fixa */
        .col-categoria {
            position: sticky; left: 0; z-index: 11; background: #f8fafc;
            width: 200px; font-weight: bold; text-align: left; color: #475569;
            border-right: 2px solid var(--border) !important;
        }

        /* Cabeçalho de Contas Fixo */
        thead th {
            background: #f1f5f9; position: sticky; top: 0; z-index: 10;
            text-align: center; color: var(--primary); font-size: 11px;
            border-bottom: 2px solid var(--border);
        }

        /* CÉLULA DE LANÇAMENTO (COMBO) */
        .cell-acumulado { display: block; font-weight: bold; font-size: 12px; text-align: right; margin-bottom: 2px; }
        .input-lancar {
            width: 100%; border: 1px solid #e2e8f0; border-radius: 3px;
            padding: 3px; box-sizing: border-box; text-align: right; font-size: 10px; outline: none;
        }
        .input-lancar:focus { border-color: var(--primary); background: #fffbeb; }

        /* SUBTÍTULOS E TOTAIS */
        .row-subtitle { background: #f1f5f9; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .row-total-grupo { background: #f8fafc; font-weight: bold; }
        .row-saldo-calculado { background: #0ea5e9; color: white; font-weight: bold; }
        .row-saldo-calculado .cell-acumulado { color: white; }
        .row-saldo-seguro { background: var(--primary); color: white; font-weight: bold; }
        .row-saldo-seguro .cell-acumulado { color: white; }

        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }

        /* Efeito visual de salvamento */
        .flash-success { animation: flash 0.6s; }
        @keyframes flash { from { background: #dcfce7; } to { background: transparent; } }
    </style>
</head>
<body>

    <div class="header-blue">
        <div>Dexco S.A - Cash Pooling (Gestão de Tesouraria)</div>
        <div class="header-btns">
            <button class="btn-export" onclick="exportarCSV()">Exportar CSV</button>
            <button class="btn-logout" onclick="window.parent.location.reload()">Sair / Bloquear</button>
        </div>
    </div>

    <div class="nav-empresas" id="tabs-container">
        <div class="tab-btn active" onclick="carregarEmpresa('BRDX', this)">BRDX</div>
        <div class="tab-btn" onclick="carregarEmpresa('BRDF', this)">BRDF</div>
        <div class="tab-btn">FLORESTAL</div>
        <div class="tab-btn">DECORTILES</div>
        <div class="tab-btn">DURATEX</div>
    </div>

    <div class="grid-container">
        <table id="table-pooling">
            <thead id="header-contas">
                </thead>
            <tbody id="corpo-caixa">
                </tbody>
        </table>
    </div>

    <script>
        // --- ESTRUTURA DE DADOS PARA TESTE DE NAVEGABILIDADE ---
        const planoContas = [
            { id: 'si', nome: 'SALDO INICIAL :', tipo: 'header' },
            { id: 'ent', nome: 'Entradas', tipo: 'subtitle', cor: 'text-success' },
            { id: 'clie', nome: 'Clientes', tipo: 'grupo' },
            { id: 'clie_cob', nome: '  Cobrança', tipo: 'item' },
            { id: 'clie_dep', nome: '  Deposito Clientes', tipo: 'item' },
            { id: 'ted_d_e', nome: 'TED D (Recebimento)', tipo: 'grupo' },
            { id: 'sai', nome: 'Saídas', tipo: 'subtitle', cor: 'text-danger' },
            { id: 'forn', nome: 'Fornecedores', tipo: 'grupo' },
            { id: 'forn_sap', nome: '  SAP', tipo: 'item' },
            { id: 'sal', nome: 'Salários', tipo: 'grupo' },
            { id: 'out', nome: 'Outros (Tarifas/Tarifas)', tipo: 'item' },
            { id: 'ted_d_s', nome: 'TED D (Envio / Transferências)', tipo: 'grupo' },
            { id: 'res_calc', nome: 'SALDO CALCULADO', tipo: 'resumo' },
            { id: 'res_marg', nome: 'MARGEM SEGURA', tipo: 'resumo' },
            { id: 'res_segu', nome: 'SALDO SEGURO', tipo: 'final' }
        ];

        // Simulação de contas (BRDX e BRDF)
        const empresas = {
            'BRDX': [
                { banco: 'ITAÚ', id: '17847-8', agc: '0262' },
                { banco: 'ITAÚ', id: '50311-5', agc: '7307' },
                { banco: 'ITAÚ', id: '50312-3', agc: '7307' },
                { banco: 'ITAÚ', id: '59363-7', agc: '0350' }
            ],
            'BRDF': [
                { banco: 'BB', id: '343329-3', agc: '1893-7' },
                { banco: 'SANTANDER', id: '130000413', agc: '2008' },
                { banco: 'BRADESCO', id: '89300-5', agc: '2372-8' }
            ]
        };

        let empresaAtiva = 'BRDX';

        // --- FUNÇÕES DE RENDERIZAÇÃO ---

        function carregarEmpresa(nome, btn) {
            empresaAtiva = nome;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderizarGrade();
        }

        function renderizarGrade() {
            const contas = empresas[empresaAtiva];
            const thead = document.getElementById('header-contas');
            const tbody = document.getElementById('corpo-caixa');

            // Render Header
            thead.innerHTML = `
                <tr>
                    <th class="col-categoria">CATEGORIA</th>
                    ${contas.map(c => `<th>${c.banco}<br><span style="font-weight:normal; font-size:9px">${c.agc} / ${c.id}</span></th>`).join('')}
                </tr>
            `;

            // Render Body
            tbody.innerHTML = planoContas.map(cat => {
                let rowClass = "";
                if (cat.tipo === 'subtitle') rowClass = "row-subtitle " + cat.cor;
                if (cat.tipo === 'header' || cat.tipo === 'grupo') rowClass = "row-total-grupo";
                if (cat.tipo === 'resumo') rowClass = "row-saldo-calculado";
                if (cat.tipo === 'final') rowClass = "row-saldo-seguro";

                return `
                    <tr class="${rowClass}">
                        <td class="col-categoria">${cat.nome}</td>
                        ${contas.map(c => {
                            if (cat.tipo === 'subtitle') return `<td></td>`;
                            
                            // Define se a célula tem input ou é apenas exibição
                            const temInput = (cat.tipo === 'item' || cat.nome.includes('TED D'));
                            
                            return `
                                <td>
                                    <span class="cell-acumulado" id="val-${cat.id}-${c.id}">0,00</span>
                                    ${temInput ? `<input type="text" class="input-lancar" placeholder="+ / -" onkeypress="executarLancamento(event, '${cat.id}', '${c.id}')">` : ''}
                                </td>
                            `;
                        }).join('')}
                    </tr>
                `;
            }).join('');
        }

        // --- LÓGICA DE LANÇAMENTO (ENTER) ---

        function executarLancamento(event, catId, contaId) {
            if (event.key === 'Enter') {
                const input = event.target;
                const valorInformado = parseFloat(input.value.replace(',', '.'));

                if (isNaN(valorInformado)) return;

                const display = document.getElementById(`val-${catId}-${contaId}`);
                let valorAtual = parseFloat(display.innerText.replace(/\./g, '').replace(',', '.'));

                // Soma ao acumulado
                let novoTotal = valorAtual + valorInformado;

                // Atualiza tela (Simulação de salvamento)
                display.innerText = novoTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                
                // Feedback visual
                input.parentElement.classList.add('flash-success');
                setTimeout(() => input.parentElement.classList.remove('flash-success'), 600);
                
                input.value = ''; // Limpa para o próximo
                recalcularSaldos(contaId);
            }
        }

        function recalcularSaldos(contaId) {
            // Aqui futuramente entrará a lógica que soma todas as entradas e subtrai as saídas 
            // e atualiza as linhas de SALDO CALCULADO e SALDO SEGURO.
            console.log("Recalculando conta: " + contaId);
        }

        function exportarCSV() {
            alert("Gerando exportação das empresas selecionadas...");
        }

        // Inicialização
        window.onload = renderizarGrade;
    </script>
</body>
</html>
